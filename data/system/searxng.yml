# SearXNG settings for Euno
# Uses default settings with JSON API enabled

use_default_settings: true

server:
  # Generate a new secret key: openssl rand -hex 32
  secret_key: "change-me-generate-with-openssl-rand-hex-32"
  bind_address: "0.0.0.0:8080"
  limiter: false  # Disable rate limiting (we control access)

search:
  # Enable JSON format for API access
  formats:
    - html
    - json

ui:
  # Disable unnecessary UI features for API-only use
  default_theme: simple
  static_use_hash: true

# Disable outgoing request rate limiting for faster searches
outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
