<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Euno - Personal Intelligence</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splash-screen">
        <div class="splash-content">
            <h1 class="splash-title" id="splash-title">
                <span class="splash-letter">E</span><span class="splash-letter">u</span><span class="splash-letter">n</span><span class="splash-letter">o</span>
            </h1>
            <p class="splash-pronunciation" id="splash-pronunciation">(you-know)</p>
            <p class="splash-tagline" id="splash-tagline">PERSONAL INTELLIGENCE</p>
        </div>
    </div>

    <!-- Login Overlay -->
    <div class="login-overlay hidden" id="login-overlay">
        <div class="login-box">
            <h1 class="login-title">Euno</h1>
            <p class="login-subtitle">Personal Intelligence</p>
            <form onsubmit="handleLogin(event)">
                <input type="password" class="login-input" id="login-password" placeholder="Password" autocomplete="current-password" autofocus>
                <button type="submit" class="login-btn" id="login-btn">Sign In</button>
            </form>
            <div class="login-error" id="login-error"></div>
        </div>
    </div>

    <div class="app-container" id="app-container">
        <div class="app">
            <!-- Tabs Container -->
            <div class="tabs-container">
                <div class="tab-content">
                    <!-- Chat Tab -->
                    <div class="tab-pane active" id="tab-chat">
                        <div class="chat-content">
                            <div class="inline-chat-messages" id="inline-messages"></div>
                        </div>
                    </div>

                    <!-- Focus Tab -->
                    <div class="tab-pane" id="tab-focus">
                        <div class="focus-content" id="focus-content">
                            <!-- Content dynamically rendered by renderFocusTab() -->
                        </div>
                    </div>

                    <!-- History Tab -->
                    <div class="tab-pane" id="tab-history">
                        <div class="history-content" id="history-list">
                            <div class="focus-empty">Loading...</div>
                        </div>
                    </div>

                    <!-- About Tab -->
                    <div class="tab-pane" id="tab-about">
                        <div class="about-content" id="about-content">
                            <div class="focus-empty">Loading...</div>
                        </div>
                    </div>

                    <!-- Settings Tab -->
                    <div class="tab-pane" id="tab-settings">
                        <div class="settings-content" id="settings-content">
                            <!-- Account Section -->
                            <div class="settings-section">
                                <h3 class="settings-section-title">Account</h3>
                                <button class="settings-btn" onclick="logout()">Sign Out</button>
                            </div>

                            <!-- Change Password Section -->
                            <div class="settings-section">
                                <h3 class="settings-section-title">Change Password</h3>
                                <form onsubmit="handleChangePassword(event)" class="settings-form">
                                    <input type="password" class="settings-input" id="current-password" placeholder="Current password" autocomplete="current-password">
                                    <input type="password" class="settings-input" id="new-password" placeholder="New password" autocomplete="new-password">
                                    <input type="password" class="settings-input" id="confirm-password" placeholder="Confirm new password" autocomplete="new-password">
                                    <button type="submit" class="settings-btn">Update Password</button>
                                    <div class="settings-message" id="password-message"></div>
                                </form>
                            </div>

                            <!-- AI Provider Section -->
                            <div class="settings-section">
                                <h3 class="settings-section-title">AI Provider</h3>
                                <div class="settings-form">
                                    <label class="settings-label">Default Provider</label>
                                    <select class="settings-select" id="default-provider" onchange="handleProviderChange()">
                                        <option value="anthropic">Anthropic (Claude)</option>
                                        <option value="openai">OpenAI (GPT)</option>
                                    </select>

                                    <div id="provider-models"></div>

                                    <button type="button" class="settings-btn" onclick="saveAISettings()">Save AI Settings</button>
                                    <div class="settings-message" id="ai-message"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab Menu (below content) -->
                <div class="tab-menu">
                    <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span>Chat</span>
                    </button>
                    <button class="tab-btn" data-tab="focus" onclick="switchTab('focus')">
                        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="4" height="4" rx="1"/><line x1="10" y1="7" x2="21" y2="7"/><rect x="3" y="15" width="4" height="4" rx="1"/><line x1="10" y1="17" x2="21" y2="17"/></svg>
                        <span>Focus</span>
                        <span class="tab-badge" id="tasks-badge" style="display: none;">0</span>
                    </button>
                    <div class="tab-overflow">
                        <button class="tab-btn" onclick="toggleOverflowMenu()" id="overflow-btn">
                            <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2" fill="currentColor"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="12" cy="19" r="2" fill="currentColor"/></svg>
                            <span>More</span>
                        </button>
                        <div class="overflow-menu" id="overflow-menu">
                            <button class="overflow-item" data-tab="history" onclick="switchTab('history'); closeOverflowMenu();">
                                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="12 6 12 12 16 14" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                                <span>History</span>
                            </button>
                            <button class="overflow-item" id="upload-btn" onclick="triggerUpload(); closeOverflowMenu();">
                                <svg viewBox="0 0 24 24">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="17 8 12 3 7 8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                                <span>Upload</span>
                            </button>
                            <button class="overflow-item" data-tab="about" onclick="switchTab('about'); closeOverflowMenu();">
                                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="16" x2="12" y2="12" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
                                <span>About</span>
                            </button>
                            <button class="overflow-item" data-tab="settings" onclick="switchTab('settings'); closeOverflowMenu();">
                                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                                <span>Settings</span>
                            </button>
                            <button class="overflow-item" onclick="resetUI(); closeOverflowMenu();">
                                <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                                <span>New Chat</span>
                            </button>
                        </div>
                    </div>
                    <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(event)" multiple>
                </div>
            </div>

            <!-- Input Bar (always visible) -->
            <div class="input-bar">
                <textarea id="context-input" placeholder="What's on your mind?" rows="1"></textarea>
                <button id="context-send-btn" onclick="sendContextMessage()" title="Send">
                    <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>

        <!-- Upload Progress -->
        <div class="upload-progress" id="upload-progress">
            <div class="upload-progress-header">
                <span class="upload-progress-filename" id="upload-filename">filename.pdf</span>
                <span class="upload-progress-percent" id="upload-percent">0%</span>
            </div>
            <div class="upload-progress-bar">
                <div class="upload-progress-fill" id="upload-fill"></div>
            </div>
            <div class="upload-progress-status" id="upload-status">Uploading...</div>
        </div>
    </div>

    <!-- JavaScript Modules (order matters) -->
    <script src="/static/js/state.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/tabs.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/focus.js"></script>
    <script src="/static/js/history.js"></script>
    <script src="/static/js/about.js"></script>
    <script src="/static/js/upload.js"></script>
    <script src="/static/js/splash.js"></script>
    <script src="/static/js/init.js"></script>
</body>
</html>
