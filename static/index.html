<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>me·an·dus</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
        }

        /* Main layout with optional panel */
        .app-container {
            display: flex;
            height: 100vh;
            justify-content: center;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 640px;
            padding: 1.5rem;
            transition: max-width 0.3s ease;
        }

        .app-container.panel-open .app {
            max-width: 480px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .logo {
            width: 200px;
            height: auto;
        }

        /* Panel toggle icons in input area */
        .panel-toggle {
            background: none;
            border: none;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            width: 40px;
        }

        .panel-toggle svg {
            width: 20px;
            height: 20px;
            stroke: #999;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .panel-toggle svg rect {
            fill: none;
        }

        .panel-toggle:hover svg {
            stroke: #333;
        }

        .panel-toggle.active svg {
            stroke: #000;
        }

        .toggle-badge {
            position: absolute;
            top: 2px;
            right: 0;
            background: #ef4444;
            color: #fff;
            font-size: 0.6rem;
            padding: 0.1rem 0.3rem;
            border-radius: 8px;
            min-width: 0.9rem;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Notification items in panel */
        .notification-item {
            display: flex;
            align-items: flex-start;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid #eee;
        }

        .notification-item:hover {
            background: #f5f5f5;
        }

        .notification-item:last-child {
            margin-bottom: 0;
        }

        .notification-icon {
            margin-right: 0.75rem;
            flex-shrink: 0;
            font-size: 1.1rem;
        }

        .notification-content {
            flex: 1;
            min-width: 0;
        }

        .notification-title {
            font-weight: 500;
            color: #333;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .notification-meta {
            color: #888;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .notification-item.priority-high {
            background: #fffbeb;
            border-color: #f59e0b;
        }

        .notification-item.priority-high:hover {
            background: #fef3c7;
        }

        .notification-item.type-approval {
            background: #eff6ff;
            border-color: #3b82f6;
        }

        .notification-item.type-approval:hover {
            background: #dbeafe;
        }

        .notification-item.type-alert {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .notification-item.type-alert:hover {
            background: #fee2e2;
        }

        .notifications-empty {
            color: #999;
            font-style: italic;
            font-size: 0.9rem;
            padding: 1rem 0;
            text-align: center;
        }

        .notifications-quiet {
            text-align: center;
            padding: 2rem 1rem;
            color: #999;
        }

        .notifications-quiet-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .notifications-quiet-text {
            font-style: italic;
        }

        /* Chat Section */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            border: 1px solid #eee;
            border-radius: 4px;
        }

        .message {
            margin-bottom: 1.25rem;
            line-height: 1.7;
        }

        .message-friend {
            padding-left: 1rem;
            border-left: 2px solid #e5e5e5;
        }

        .message-you {
            color: #333;
        }

        .message-content {
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message-thinking {
            color: #999;
            font-style: italic;
            display: flex;
            align-items: center;
            padding-left: 1rem;
            border-left: 2px solid #e5e5e5;
        }

        .thinking-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 0.5rem;
        }

        .thinking-dots span {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: thinking 1.4s infinite;
        }

        .thinking-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes thinking {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Chat Input */
        .chat-input-container {
            padding-top: 1rem;
        }

        .chat-input {
            display: flex;
            gap: 0.25rem;
            align-items: flex-end;
        }

        .chat-input textarea {
            flex: 1;
            padding: 0.875rem 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
            resize: none;
            min-height: 48px;
            max-height: 200px;
            line-height: 1.4;
            overflow-y: auto;
        }

        .chat-input textarea:focus {
            outline: none;
            border-color: #666;
        }

        .chat-input textarea:disabled {
            background: #fafafa;
            color: #999;
        }

        #send-btn {
            padding: 0.875rem 1.5rem;
            border: none;
            background: #000;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            height: 48px;
            margin-right: 0.25rem;
        }

        #send-btn:hover:not(:disabled) {
            background: #333;
        }

        #send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Quick actions - subtle hints, not buttons */
        .hints {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #999;
        }

        .hint {
            display: inline;
            cursor: pointer;
        }

        .hint:hover {
            color: #666;
        }

        /* ============== Side Panels ============== */
        .panel {
            width: 280px;
            height: 100vh;
            background: #fafafa;
            border-left: 1px solid #eee;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .panel.active {
            display: flex;
        }

        .panel-header {
            padding: 1.5rem 1rem 1rem;
            border-bottom: 1px solid #eee;
            background: #fff;
        }

        .panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #999;
            margin-bottom: 0.25rem;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        /* Panel Sections */
        .panel-section {
            margin-bottom: 1.5rem;
        }

        .panel-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .panel-section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .panel-section-count {
            font-size: 0.75rem;
            color: #999;
            background: #eee;
            padding: 0.1rem 0.4rem;
            border-radius: 10px;
        }

        /* Task Items */
        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.15s;
        }

        .task-item:hover {
            background: #f0f0f0;
            margin: 0 -0.5rem;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-checkbox {
            width: 16px;
            height: 16px;
            border: 1.5px solid #ccc;
            border-radius: 3px;
            margin-right: 0.75rem;
            margin-top: 2px;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.15s;
        }

        .task-checkbox:hover {
            border-color: #666;
        }

        .task-item.completed .task-checkbox {
            background: #10b981;
            border-color: #10b981;
        }

        .task-item.completed .task-checkbox::after {
            content: '✓';
            color: white;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .task-item.completed .task-description {
            text-decoration: line-through;
            color: #999;
        }

        .task-description {
            font-size: 0.9rem;
            color: #333;
            line-height: 1.4;
            flex: 1;
        }

        .task-meta {
            font-size: 0.75rem;
            color: #999;
            margin-top: 0.25rem;
        }

        .task-empty {
            color: #999;
            font-style: italic;
            font-size: 0.9rem;
            padding: 0.5rem 0;
        }

        /* Project Items */
        .project-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }

        .project-item:last-child {
            border-bottom: none;
        }

        .project-header {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: color 0.15s;
        }

        .project-header:hover {
            color: #000;
        }

        .project-toggle {
            font-size: 0.7rem;
            color: #999;
            margin-right: 0.5rem;
            transition: transform 0.2s;
        }

        .project-item.expanded .project-toggle {
            transform: rotate(90deg);
        }

        .project-name {
            font-size: 0.9rem;
            color: #333;
            flex: 1;
        }

        .project-badge {
            font-size: 0.7rem;
            color: #666;
            background: #eee;
            padding: 0.1rem 0.4rem;
            border-radius: 8px;
        }

        .project-tasks {
            display: none;
            padding-left: 1.25rem;
            margin-top: 0.5rem;
        }

        .project-item.expanded .project-tasks {
            display: block;
        }

        .project-empty {
            color: #999;
            font-style: italic;
            font-size: 0.9rem;
            padding: 0.5rem 0;
        }

        /* Quick Add Input */
        .panel-footer {
            padding: 0.75rem;
            border-top: 1px solid #eee;
            background: #fff;
        }

        .quick-add-form {
            display: flex;
            gap: 0.5rem;
        }

        .quick-add-input {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        .quick-add-input:focus {
            outline: none;
            border-color: #666;
        }

        .quick-add-input::placeholder {
            color: #999;
        }

        .quick-add-btn {
            padding: 0.5rem 0.75rem;
            border: none;
            border-radius: 4px;
            background: #000;
            color: #fff;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .quick-add-btn:hover {
            background: #333;
        }

        .quick-add-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Markdown Styles */
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4 {
            margin: 0.75em 0 0.5em 0;
            line-height: 1.3;
        }

        .message-content h1:first-child,
        .message-content h2:first-child,
        .message-content h3:first-child,
        .message-content h4:first-child {
            margin-top: 0;
        }

        .message-content h1 { font-size: 1.4em; }
        .message-content h2 { font-size: 1.2em; }
        .message-content h3 { font-size: 1.1em; }
        .message-content h4 { font-size: 1em; font-weight: 600; }

        .message-content p {
            margin: 0.5em 0;
        }

        .message-content p:first-child {
            margin-top: 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content strong {
            font-weight: 600;
        }

        .message-content em {
            font-style: italic;
        }

        .message-content ul,
        .message-content ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }

        .message-content li {
            margin: 0.25em 0;
        }

        .message-content code {
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 0.9em;
            background: #f5f5f5;
            padding: 0.15em 0.4em;
            border-radius: 3px;
        }

        .message-content pre {
            margin: 0.75em 0;
            padding: 0.75em 1em;
            background: #f5f5f5;
            border-radius: 4px;
            overflow-x: auto;
        }

        .message-content pre code {
            background: none;
            padding: 0;
            font-size: 0.85em;
            line-height: 1.5;
        }

        .message-content blockquote {
            margin: 0.75em 0;
            padding-left: 1em;
            border-left: 3px solid #ddd;
            color: #666;
        }

        .message-content a {
            color: #0066cc;
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        .message-content hr {
            margin: 1em 0;
            border: none;
            border-top: 1px solid #eee;
        }

        .message-content table {
            margin: 0.75em 0;
            border-collapse: collapse;
            width: 100%;
        }

        .message-content th,
        .message-content td {
            padding: 0.5em 0.75em;
            border: 1px solid #ddd;
            text-align: left;
        }

        .message-content th {
            background: #f9f9f9;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 800px) {
            .app-container.panel-open .app {
                display: none;
            }

            .panel {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app-container">
        <div class="app">
            <header>
                <img src="/static/images/meanddus-logo-with-subtitle.png" alt="me·an·dus" class="logo">
            </header>

            <section class="chat">
                <div class="messages" id="messages">
                    <div class="message message-friend">
                        <div class="message-content">Hey. I'm here when you need me. What's on your mind?</div>
                    </div>
                </div>

                <div class="chat-input-container">
                    <div class="chat-input">
                        <textarea id="chat-input" placeholder="Talk to me..." rows="1" autofocus></textarea>
                        <button id="send-btn" onclick="sendMessage()">Send</button>
                        <button class="panel-toggle" id="notifications-toggle" onclick="togglePanel('notifications')" title="Attention">
                            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                            <span class="toggle-badge" id="notifications-badge" style="display: none;">0</span>
                        </button>
                        <button class="panel-toggle" id="tasks-toggle" onclick="togglePanel('tasks')" title="Tasks">
                            <svg viewBox="0 0 24 24"><rect x="3" y="5" width="4" height="4" rx="1"/><line x1="10" y1="7" x2="21" y2="7"/><rect x="3" y="15" width="4" height="4" rx="1"/><line x1="10" y1="17" x2="21" y2="17"/></svg>
                            <span class="toggle-badge" id="tasks-badge" style="display: none;">0</span>
                        </button>
                    </div>
                    <div class="hints">
                        Try: <span class="hint" onclick="askAbout('what tasks do I have today')">"tasks today"</span> ·
                        <span class="hint" onclick="askAbout('show my projects')">"my projects"</span> ·
                        <span class="hint" onclick="askAbout('create a task to')">"create task"</span> ·
                        <span class="hint" onclick="askAbout('what has the agent completed for me')">"results"</span>
                    </div>
                </div>
            </section>
        </div>

        <!-- Notifications Panel -->
        <aside class="panel" id="notifications-panel">
            <div class="panel-header">
                <div class="panel-title">Attention</div>
            </div>

            <div class="panel-content" id="notifications-content">
                <div class="notifications-quiet">
                    <div class="notifications-quiet-icon">&#10024;</div>
                    <div class="notifications-quiet-text">All quiet. Your attention is free.</div>
                </div>
            </div>
        </aside>

        <!-- Tasks Panel -->
        <aside class="panel" id="tasks-panel">
            <div class="panel-header">
                <div class="panel-title">Tasks</div>
            </div>

            <div class="panel-content">
                <!-- Today's Tasks -->
                <div class="panel-section">
                    <div class="panel-section-header">
                        <span class="panel-section-title">Today</span>
                        <span class="panel-section-count" id="today-count">0</span>
                    </div>
                    <div id="today-tasks">
                        <div class="task-empty">No tasks for today</div>
                    </div>
                </div>

                <!-- Projects -->
                <div class="panel-section">
                    <div class="panel-section-header">
                        <span class="panel-section-title">Projects</span>
                        <span class="panel-section-count" id="projects-count">0</span>
                    </div>
                    <div id="projects-list">
                        <div class="project-empty">No active projects</div>
                    </div>
                </div>
            </div>

            <div class="panel-footer">
                <div class="quick-add-form">
                    <input type="text" id="quick-add-input" class="quick-add-input" placeholder="Add a task..." onkeypress="if(event.key==='Enter')quickAddTask()">
                    <button class="quick-add-btn" onclick="quickAddTask()">Add</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // Configure marked for security
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: false,
            mangle: false
        });

        // State
        let sessionId = localStorage.getItem('sessionId') || null;
        let isWaiting = false;
        let activePanel = localStorage.getItem('activePanel') || null;
        let tasksData = [];
        let projectsData = [];
        let notificationsData = [];

        // Elements
        const appContainer = document.getElementById('app-container');
        const messagesEl = document.getElementById('messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const notificationsPanel = document.getElementById('notifications-panel');
        const tasksPanel = document.getElementById('tasks-panel');
        const notificationsToggle = document.getElementById('notifications-toggle');
        const tasksToggle = document.getElementById('tasks-toggle');

        // Initialize panel state
        if (activePanel) {
            appContainer.classList.add('panel-open');
            document.getElementById(`${activePanel}-panel`).classList.add('active');
            document.getElementById(`${activePanel}-toggle`).classList.add('active');
        }

        // Panel toggle
        function togglePanel(panelName) {
            const panel = document.getElementById(`${panelName}-panel`);
            const toggle = document.getElementById(`${panelName}-toggle`);

            if (activePanel === panelName) {
                // Close panel
                panel.classList.remove('active');
                toggle.classList.remove('active');
                appContainer.classList.remove('panel-open');
                activePanel = null;
                localStorage.removeItem('activePanel');
            } else {
                // Close other panel if open
                if (activePanel) {
                    document.getElementById(`${activePanel}-panel`).classList.remove('active');
                    document.getElementById(`${activePanel}-toggle`).classList.remove('active');
                }

                // Open this panel
                panel.classList.add('active');
                toggle.classList.add('active');
                appContainer.classList.add('panel-open');
                activePanel = panelName;
                localStorage.setItem('activePanel', panelName);

                // Load data for the panel
                if (panelName === 'tasks') {
                    loadTasksData();
                } else if (panelName === 'notifications') {
                    loadNotificationsData();
                }
            }
        }

        // Load tasks data
        async function loadTasksData() {
            try {
                const [tasksRes, projectsRes] = await Promise.all([
                    fetch('/api/tasks'),
                    fetch('/api/projects')
                ]);

                const tasksJson = await tasksRes.json();
                const projectsJson = await projectsRes.json();

                tasksData = tasksJson.tasks || [];
                projectsData = projectsJson.projects || [];

                renderTodayTasks();
                renderProjects();
                updateTasksBadge();
            } catch (error) {
                console.error('Failed to load tasks data:', error);
            }
        }

        // Load notifications data
        async function loadNotificationsData() {
            try {
                const response = await fetch('/api/notifications');
                const data = await response.json();
                notificationsData = data.notifications || [];
                renderNotifications();
                updateNotificationsBadge();
            } catch (error) {
                console.error('Failed to load notifications:', error);
            }
        }

        // Render notifications in panel
        function renderNotifications() {
            const container = document.getElementById('notifications-content');

            if (notificationsData.length === 0) {
                container.innerHTML = `
                    <div class="notifications-quiet">
                        <div class="notifications-quiet-icon">&#10024;</div>
                        <div class="notifications-quiet-text">All quiet. Your attention is free.</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = notificationsData.map((n, idx) => {
                const typeClass = n.type ? `type-${n.type}` : '';
                const priorityClass = n.priority === 'high' ? 'priority-high' : '';
                const icon = getNotificationIcon(n.type);

                return `
                    <div class="notification-item ${typeClass} ${priorityClass}"
                         onclick="handleNotificationClick(notificationsData[${idx}])">
                        <span class="notification-icon">${icon}</span>
                        <div class="notification-content">
                            <div class="notification-title">${escapeHtml(n.title)}</div>
                            <div class="notification-meta">from ${escapeHtml(n.agent_name)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update badges
        function updateNotificationsBadge() {
            const badge = document.getElementById('notifications-badge');
            const count = notificationsData.length;
            badge.textContent = count;
            badge.style.display = count > 0 ? 'inline' : 'none';
        }

        function updateTasksBadge() {
            const badge = document.getElementById('tasks-badge');
            const today = new Date().toISOString().split('T')[0];
            const count = tasksData.filter(t => {
                const dueDate = t.scheduling?.due_date;
                const isToday = dueDate === today || !dueDate;
                return t.status === 'pending' && isToday;
            }).length;
            badge.textContent = count;
            badge.style.display = count > 0 ? 'inline' : 'none';
        }

        // Render today's tasks
        function renderTodayTasks() {
            const container = document.getElementById('today-tasks');
            const countEl = document.getElementById('today-count');

            const today = new Date().toISOString().split('T')[0];
            const todayTasks = tasksData.filter(t => {
                const dueDate = t.scheduling?.due_date;
                const isToday = dueDate === today || !dueDate;
                const isPending = t.status === 'pending' || t.status === 'in_progress';
                return isToday && (isPending || t.status === 'completed');
            }).slice(0, 10); // Limit to 10

            const pendingCount = todayTasks.filter(t => t.status !== 'completed').length;
            countEl.textContent = pendingCount;

            if (todayTasks.length === 0) {
                container.innerHTML = '<div class="task-empty">No tasks for today</div>';
                return;
            }

            container.innerHTML = todayTasks.map((task, idx) => `
                <div class="task-item ${task.status === 'completed' ? 'completed' : ''}" data-task-id="${task.id}">
                    <div class="task-checkbox" onclick="toggleTask(event, '${task.id}')"></div>
                    <div class="task-info" onclick="discussTask('${escapeHtml(task.description)}')">
                        <div class="task-description">${escapeHtml(task.description)}</div>
                        ${task.project_id ? `<div class="task-meta">in project</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Render projects
        function renderProjects() {
            const container = document.getElementById('projects-list');
            const countEl = document.getElementById('projects-count');

            const activeProjects = projectsData.filter(p => p.status === 'active');
            countEl.textContent = activeProjects.length;

            if (activeProjects.length === 0) {
                container.innerHTML = '<div class="project-empty">No active projects</div>';
                return;
            }

            container.innerHTML = activeProjects.map(project => {
                const projectTasks = tasksData.filter(t => t.project_id === project.id && t.status !== 'completed');
                const taskCount = projectTasks.length;

                return `
                    <div class="project-item" data-project-id="${project.id}">
                        <div class="project-header" onclick="toggleProject('${project.id}')">
                            <span class="project-toggle">▶</span>
                            <span class="project-name">${escapeHtml(project.title)}</span>
                            <span class="project-badge">${taskCount}</span>
                        </div>
                        <div class="project-tasks">
                            ${projectTasks.length === 0
                                ? '<div class="task-empty">No pending tasks</div>'
                                : projectTasks.map(task => `
                                    <div class="task-item ${task.status === 'completed' ? 'completed' : ''}" data-task-id="${task.id}">
                                        <div class="task-checkbox" onclick="toggleTask(event, '${task.id}')"></div>
                                        <div class="task-description" onclick="discussTask('${escapeHtml(task.description)}')">${escapeHtml(task.description)}</div>
                                    </div>
                                `).join('')
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Toggle project expansion
        function toggleProject(projectId) {
            const projectEl = document.querySelector(`[data-project-id="${projectId}"]`);
            if (projectEl) {
                projectEl.classList.toggle('expanded');
            }
        }

        // Toggle task completion
        async function toggleTask(event, taskId) {
            event.stopPropagation();

            const task = tasksData.find(t => t.id === taskId);
            if (!task) return;

            const newStatus = task.status === 'completed' ? 'pending' : 'completed';

            // Optimistic update
            task.status = newStatus;
            renderTodayTasks();
            renderProjects();

            // Update via chat (let the agent handle it)
            const action = newStatus === 'completed' ? 'completed' : 'reopened';
            addMessage(`Mark task "${task.description}" as ${action}`, 'you');
            setWaiting(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Mark the task "${task.description}" as ${action}`,
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                sessionId = data.session_id;
                localStorage.setItem('sessionId', sessionId);

                removeThinking();
                addMessage(data.response, 'friend');

                // Refresh panel data
                loadTasksData();
            } catch (error) {
                removeThinking();
                addMessage('Had trouble updating that task.', 'friend');
            }

            setWaiting(false);
        }

        // Discuss a task
        function discussTask(description) {
            chatInput.value = `Tell me about the task: ${description}`;
            chatInput.focus();
        }

        // Quick add task
        function quickAddTask() {
            const quickInput = document.getElementById('quick-add-input');
            const task = quickInput.value.trim();

            if (!task || isWaiting) return;

            // Send as chat message
            chatInput.value = `Create a task to ${task}`;
            quickInput.value = '';
            sendMessage();
        }

        // Send message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || isWaiting) return;

            addMessage(message, 'you');
            chatInput.value = '';
            chatInput.style.height = 'auto';
            setWaiting(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                const data = await response.json();
                sessionId = data.session_id;
                localStorage.setItem('sessionId', sessionId);

                removeThinking();

                // Check if we should clear the chat
                if (data.clear_chat) {
                    clearMessages();
                }

                addMessage(data.response, 'friend');

                // Always refresh data after chat (tasks/projects may have changed)
                setTimeout(pollData, 300);
            } catch (error) {
                removeThinking();
                addMessage('I had trouble processing that. Could you try again?', 'friend');
            }

            setWaiting(false);
        }

        function clearMessages() {
            // Clear all messages except keep the container
            messagesEl.innerHTML = '';
        }

        function setWaiting(waiting) {
            isWaiting = waiting;
            chatInput.disabled = waiting;
            sendBtn.disabled = waiting;

            if (waiting) {
                addThinking();
            }
        }

        function addMessage(content, role) {
            const div = document.createElement('div');
            div.className = `message message-${role}`;

            let html;
            if (role === 'friend') {
                html = marked.parse(content);
            } else {
                html = escapeHtml(content);
            }

            div.innerHTML = `<div class="message-content">${html}</div>`;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function addThinking() {
            const div = document.createElement('div');
            div.className = 'message-thinking';
            div.id = 'thinking';
            div.innerHTML = `Thinking<div class="thinking-dots"><span></span><span></span><span></span></div>`;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function removeThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function askAbout(query) {
            chatInput.value = query;
            chatInput.focus();
        }

        // Auto-expand textarea as user types
        function autoExpand(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        chatInput.addEventListener('input', () => autoExpand(chatInput));

        // Enter to send (Shift+Enter for newline)
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !isWaiting) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Notification helpers
        function getNotificationIcon(type) {
            switch (type) {
                case 'approval': return '👋';
                case 'question': return '❓';
                case 'alert': return '⚠️';
                default: return '💬';
            }
        }

        function handleNotificationClick(notification) {
            fetch(`/api/notifications/${notification.id}/seen`, { method: 'POST' });

            if (notification.action_prompt) {
                chatInput.value = notification.action_prompt;
                chatInput.focus();
            } else {
                chatInput.value = `Tell me about: ${notification.title}`;
                chatInput.focus();
            }

            // Refresh notifications after marking as seen
            setTimeout(loadNotificationsData, 500);
        }

        // Polling for badge updates
        async function pollData() {
            try {
                // Always fetch both for badge updates
                const [tasksRes, notifRes] = await Promise.all([
                    fetch('/api/tasks'),
                    fetch('/api/notifications')
                ]);

                const tasksJson = await tasksRes.json();
                const notifJson = await notifRes.json();

                tasksData = tasksJson.tasks || [];
                notificationsData = notifJson.notifications || [];

                updateTasksBadge();
                updateNotificationsBadge();

                // Refresh active panel content
                if (activePanel === 'tasks') {
                    const projectsRes = await fetch('/api/projects');
                    projectsData = (await projectsRes.json()).projects || [];
                    renderTodayTasks();
                    renderProjects();
                } else if (activePanel === 'notifications') {
                    renderNotifications();
                }
            } catch (error) {
                // Silent fail
            }
        }

        // Initialize
        pollData();
        setInterval(pollData, 5000);

        // Load active panel data if open
        if (activePanel === 'tasks') {
            loadTasksData();
        } else if (activePanel === 'notifications') {
            loadNotificationsData();
        }

        chatInput.focus();
    </script>
</body>
</html>
