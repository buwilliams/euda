<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euno, Personal Intelligence.</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
        }

        /* Main layout with optional panel */
        .app-container {
            display: flex;
            height: 100vh;
            justify-content: center;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 640px;
            padding: 1.5rem;
        }

        /* ============== Context/Quote Content ============== */
        .context-content {
            flex: 0 0 auto;
            overflow-y: auto;
            padding: 0.5rem 0;
            max-height: 40vh;
        }

        .context-content:empty {
            display: none;
        }

        .greeting {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .context-section {
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
            margin-bottom: 0.75rem;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .section-content {
            padding-left: 0;
        }

        /* Context items */
        .context-item {
            display: flex;
            align-items: flex-start;
            padding: 0.5rem 0;
            line-height: 1.5;
        }

        .context-item-bullet {
            color: #999;
            margin-right: 0.5rem;
            flex-shrink: 0;
        }

        .context-item-content {
            flex: 1;
        }

        .context-item-meta {
            font-size: 0.85rem;
            color: #666;
            margin-left: 1rem;
        }

        .context-empty {
            color: #999;
            font-style: italic;
            padding: 0.5rem 0;
        }

        /* Action prompts */
        .action-prompt {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 0.5rem;
        }

        .action-prompt-text {
            color: #333;
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        .action-btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #333;
        }

        /* Noticed patterns */
        .noticed-item {
            padding: 0.5rem 0;
            color: #666;
            font-size: 0.95rem;
        }

        /* Active Day View (Minimal) */
        .active-view-minimal {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            color: #666;
        }

        .active-current {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .active-next {
            font-size: 1rem;
            color: #999;
        }

        .active-next a {
            color: #666;
            text-decoration: underline;
            cursor: pointer;
        }

        .surfaced-notice {
            margin-top: 2rem;
            padding: 1rem;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .surfaced-notice-text {
            margin-bottom: 0.75rem;
        }

        .surfaced-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .surfaced-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        .surfaced-btn:hover {
            background: #f5f5f5;
        }

        /* Inline Chat */
        .inline-chat {
            flex: 1;
            padding: 1rem 0;
            overflow-y: auto;
            min-height: 100px;
        }

        .inline-chat-messages {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .inline-message {
            line-height: 1.6;
            max-width: 90%;
            animation: fadeIn 0.3s ease-out;
        }

        .inline-message-you {
            align-self: flex-end;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 0.5rem 0.75rem;
            font-size: 0.95rem;
        }

        .inline-message-friend {
            align-self: flex-start;
        }

        .inline-message-friend .message-content {
            color: #333;
        }

        /* Day Summary (Evening) */
        .summary-item {
            display: flex;
            align-items: center;
            padding: 0.35rem 0;
        }

        .summary-check {
            color: #10b981;
            margin-right: 0.5rem;
        }

        .summary-deferred {
            color: #f59e0b;
            margin-right: 0.5rem;
        }

        /* Open threads */
        .thread-item {
            display: flex;
            align-items: flex-start;
            padding: 0.5rem 0;
        }

        .thread-urgency {
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            margin-right: 0.75rem;
            flex-shrink: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .thread-urgency.can-wait {
            background: #f3f4f6;
            color: #6b7280;
        }

        .thread-urgency.soon {
            background: #fef3c7;
            color: #92400e;
        }

        .thread-urgency.do-now {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Tomorrow preview */
        .tomorrow-preview {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 1rem;
        }

        .tomorrow-summary {
            color: #666;
            margin-bottom: 0.5rem;
        }

        .tomorrow-suggestion {
            color: #888;
            font-size: 0.9rem;
        }

        /* ============== Messages (for panels and inline) ============== */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            line-height: 1.6;
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-friend {
            align-self: flex-start;
            background: #f5f5f5;
            border-radius: 18px 18px 18px 4px;
            padding: 0.75rem 1rem;
        }

        .message-you {
            align-self: flex-end;
            background: #000;
            color: #fff;
            border-radius: 18px 18px 4px 18px;
            padding: 0.75rem 1rem;
        }

        .message-content {
            word-wrap: break-word;
            overflow-wrap: break-word;
            overflow: visible;
        }

        .message-thinking {
            color: #999;
            font-style: italic;
            display: flex;
            align-items: center;
            align-self: flex-start;
            background: #f5f5f5;
            border-radius: 18px 18px 18px 4px;
            padding: 0.75rem 1rem;
            animation: fadeIn 0.3s ease-out;
        }

        .message-system {
            align-self: stretch;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 1rem;
            max-width: 100%;
            animation: fadeIn 0.3s ease-out;
        }

        .message-system-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e9ecef;
        }

        .message-system-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
        }

        .message-system-close {
            background: none;
            border: none;
            font-size: 1.25rem;
            color: #999;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .message-system-close:hover {
            color: #333;
        }

        .message-system-body {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #333;
        }

        .message-system-body h2 {
            font-size: 1rem;
            margin: 1rem 0 0.5rem;
            color: #333;
        }

        .message-system-body h2:first-child { margin-top: 0; }

        .message-system-body h3 {
            font-size: 0.95rem;
            margin: 0.75rem 0 0.25rem;
            color: #444;
        }

        .message-system-body p { margin: 0.5rem 0; }
        .message-system-body ul, .message-system-body ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .message-system-body li { margin: 0.25rem 0; }
        .message-system-body hr { border: none; border-top: 1px dashed #ddd; margin: 1rem 0; }

        .thinking-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 0.5rem;
        }

        .thinking-dots span {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: thinking 1.4s infinite;
        }

        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes thinking {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ============== Chat Input (Bottom Bar) ============== */
        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            padding: 0.75rem 0;
            border-top: none;
        }

        .clear-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            color: #666;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .clear-btn:hover {
            background: #eee;
            color: #333;
        }

        .clear-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .input-bar textarea {
            flex: 1;
            padding: 0.6rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            min-height: 40px;
            max-height: 200px;
            line-height: 1.4;
            overflow-y: auto;
        }

        .input-bar textarea:focus {
            outline: none;
            border-color: #999;
        }

        .input-bar textarea:disabled {
            background: #fafafa;
            color: #999;
        }

        #context-send-btn {
            padding: 0.6rem 1.25rem;
            height: 40px;
            border: none;
            border-radius: 6px;
            background: #000;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        #context-send-btn:hover:not(:disabled) { background: #333; }
        #context-send-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* ============== Tabs Container ============== */
        .tabs-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .tab-content {
            flex: 1;
            overflow: hidden;
            border: 1px solid #ddd;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            background: #fff;
        }

        .tab-pane {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding: 1rem;
        }

        .tab-pane.active {
            display: block;
        }

        /* Tab Menu */
        .tab-menu {
            display: flex;
            align-items: stretch;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-top: none;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1rem;
            background: #f0f0f0;
            border: none;
            border-right: 1px solid #ddd;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            color: #666;
            transition: all 0.15s;
            position: relative;
        }

        .tab-btn:hover {
            background: #e8e8e8;
            color: #333;
        }

        .tab-btn.active {
            background: #fff;
            color: #333;
            margin-top: -1px;
            padding-top: calc(0.6rem + 1px);
            border-top: 1px solid #fff;
        }

        .tab-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tab-btn svg rect {
            fill: none;
        }

        .tab-badge {
            background: #ef4444;
            color: #fff;
            font-size: 0.65rem;
            padding: 0.1rem 0.35rem;
            border-radius: 8px;
            min-width: 1rem;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .tab-spacer {
            flex: 1;
        }

        .tab-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 0.8rem;
            background: transparent;
            border: none;
            border-left: 1px solid #ddd;
            cursor: pointer;
            color: #666;
            transition: all 0.15s;
        }

        .tab-action-btn:hover {
            background: #e8e8e8;
            color: #333;
        }

        .tab-action-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ============== Focus Tab Sections ============== */
        .focus-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .focus-section {
            margin-bottom: 0;
        }

        .focus-section-header {
            display: flex;
            align-items: center;
            margin-bottom: 0.75rem;
            cursor: pointer;
            user-select: none;
        }

        .focus-section-header:hover { opacity: 0.8; }

        .section-toggle {
            font-size: 0.7rem;
            color: #999;
            margin-right: 0.5rem;
            transition: transform 0.2s;
        }

        .focus-section.collapsed .section-toggle {
            transform: rotate(-90deg);
        }

        .focus-section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            flex: 1;
        }

        .focus-section-count {
            font-size: 0.75rem;
            color: #999;
            background: #eee;
            padding: 0.1rem 0.4rem;
            border-radius: 10px;
        }

        .focus-section-content {
            transition: max-height 0.2s ease-out, opacity 0.2s ease-out;
        }

        .focus-section.collapsed .focus-section-content {
            display: none;
        }

        .focus-empty {
            color: #999;
            font-style: italic;
            font-size: 0.9rem;
            padding: 0.5rem 0;
        }

        /* ============== Chat Tab ============== */
        .chat-content {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-content .context-content {
            flex: 0 0 auto;
        }

        .chat-content .inline-chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* ============== History Tab ============== */
        .history-content {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* ============== Cards (Minimal & Full) ============== */
        .card {
            border: 1px solid #eee;
            border-radius: 6px;
            background: #fff;
            transition: all 0.2s;
        }

        /* Minimal Card */
        .card-minimal {
            padding: 0.6rem 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-minimal:hover {
            background: #f9f9f9;
            border-color: #ddd;
        }

        .card-title {
            flex: 1;
            font-size: 0.9rem;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .card-badge {
            font-size: 0.75rem;
            color: #666;
            background: #f0f0f0;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .card-date {
            font-size: 0.75rem;
            color: #999;
            flex-shrink: 0;
        }

        .card-preview {
            flex: 1;
            font-size: 0.85rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        /* Full Card (Expanded) */
        .card-full {
            padding: 0;
        }

        .card-header {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: #fafafa;
            border-radius: 6px 6px 0 0;
        }

        .card-header .card-title {
            white-space: normal;
            overflow: visible;
            flex: 1;
        }

        .card-collapse {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #999;
            cursor: pointer;
            padding: 0 0.25rem;
            line-height: 1;
            flex-shrink: 0;
            margin-left: 0.5rem;
        }

        .card-collapse:hover {
            color: #333;
        }

        .card-body {
            padding: 0.75rem;
        }

        .card-meta {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .card-description {
            font-size: 0.9rem;
            color: #333;
            line-height: 1.5;
        }

        .card-description p { margin: 0.5rem 0; }
        .card-description p:first-child { margin-top: 0; }
        .card-description p:last-child { margin-bottom: 0; }

        .card-actions {
            padding: 0.5rem 0.75rem;
            border-top: 1px solid #eee;
            display: flex;
            gap: 0.5rem;
            background: #fafafa;
            border-radius: 0 0 6px 6px;
        }

        .card-action {
            padding: 0.35rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            color: #666;
            transition: all 0.15s;
        }

        .card-action:hover {
            border-color: #999;
            color: #333;
        }

        .card-action.primary {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        .card-action.primary:hover {
            background: #333;
        }

        .card-action.danger:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        /* ============== Project Group ============== */
        .project-group {
            margin-bottom: 1rem;
        }

        .project-group:last-child {
            margin-bottom: 0;
        }

        .project-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #666;
            padding-bottom: 0.35rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #ddd;
        }

        .project-group .card {
            margin-bottom: 0.35rem;
        }

        .project-group .card:last-child {
            margin-bottom: 0;
        }

        /* ============== Nested Task Cards in Project ============== */
        .card-tasks {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-top: 0.5rem;
        }

        .card-tasks .card {
            margin-bottom: 0;
        }

        /* ============== Note Cards ============== */
        .card-notes {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px dashed #eee;
        }

        .card-notes-header {
            font-size: 0.75rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 0.25rem;
        }

        /* Add Task Input in Project Card */
        .card-add-task {
            display: flex;
            gap: 0.25rem;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px dashed #eee;
        }

        .card-add-input {
            flex: 1;
            padding: 0.35rem 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.8rem;
        }

        .card-add-input:focus {
            outline: none;
            border-color: #999;
        }

        .card-add-btn {
            padding: 0.35rem 0.6rem;
            border: none;
            background: #000;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .card-add-btn:hover {
            background: #333;
        }

        /* Task items */
        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.15s;
        }

        .task-item:hover {
            background: #f0f0f0;
            margin: 0 -0.5rem;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }

        .task-item:last-child { border-bottom: none; }

        .task-checkbox {
            width: 16px;
            height: 16px;
            border: 1.5px solid #ccc;
            border-radius: 3px;
            margin-right: 0.75rem;
            margin-top: 2px;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.15s;
        }

        .task-checkbox:hover { border-color: #666; }

        .task-item.completed .task-checkbox {
            background: #10b981;
            border-color: #10b981;
        }

        .task-item.completed .task-checkbox::after {
            content: '✓';
            color: white;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .task-item.completed .task-description {
            text-decoration: line-through;
            color: #999;
        }

</head>
<body>
    <div class="app-container" id="app-container">
        <div class="app">
            <!-- Tabs Container -->
            <div class="tabs-container">
                <div class="tab-content">
                    <!-- Chat Tab -->
                    <div class="tab-pane active" id="tab-chat">
                        <div class="chat-content">
                            <div class="context-content" id="context-content">
                                <div class="loading-spinner">Loading...</div>
                            </div>
                            <div class="inline-chat-messages" id="inline-messages"></div>
                        </div>
                    </div>

                    <!-- Focus Tab -->
                    <div class="tab-pane" id="tab-focus">
                        <div class="focus-content">
                            <div class="focus-section" id="section-today">
                                <div class="focus-section-header" onclick="toggleSection('today')">

                                    <span class="focus-section-count" id="today-count">0</span>
                                </div>
                                <div class="focus-section-content" id="today-tasks">
                                    <div class="focus-empty">No tasks for today</div>
                                </div>
                            </div>
                            <div class="focus-section" id="section-projects">
                                <div class="focus-section-header" onclick="toggleSection('projects')">
                                    <span class="section-toggle">▼</span>
                                    <span class="focus-section-title">Projects</span>
                                    <span class="focus-section-count" id="projects-count">0</span>
                                </div>
                                <div class="focus-section-content" id="projects-list">
                                    <div class="focus-empty">No active projects</div>
                                </div>
                            </div>
                            <div class="focus-section collapsed" id="section-completed">
                                <div class="focus-section-header" onclick="toggleSection('completed')">
                                    <span class="section-toggle">▼</span>
                                    <span class="focus-section-title">Completed</span>
                                    <span class="focus-section-count" id="completed-count">0</span>
                                </div>
                                <div class="focus-section-content" id="completed-tasks">

                            </div>

                    </div>

                    <!-- History Tab -->
                    <div class="tab-pane" id="tab-history">
                        <div class="history-content" id="history-list">
                            <div class="focus-empty">Loading...</div>
                        </div>
                    </div>
                </div>

                <!-- Tab Menu (below content) -->
                <div class="tab-menu">
                    <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span>Chat</span>
                    </button>
                    <button class="tab-btn" data-tab="focus" onclick="switchTab('focus')">
                        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="4" height="4" rx="1"/><line x1="10" y1="7" x2="21" y2="7"/><rect x="3" y="15" width="4" height="4" rx="1"/><line x1="10" y1="17" x2="21" y2="17"/></svg>
                        <span>Focus</span>
                        <span class="tab-badge" id="tasks-badge" style="display: none;">0</span>
                    </button>
                    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="12 6 12 12 16 14" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        <span>History</span>
                    </button>
                    <div class="tab-spacer"></div>
                    <button class="tab-action-btn" id="upload-btn" onclick="triggerUpload()" title="Upload file">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </button>
                    <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(event)" multiple>

            </div>

            <!-- Input Bar (always visible) -->
            <div class="input-bar">
                <button class="clear-btn" onclick="resetUI()" title="Clear chat">
                    <svg viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <textarea id="context-input" placeholder="Talk to me..." rows="1"></textarea>
                <button id="context-send-btn" onclick="sendContextMessage()">Send</button>
            </div>

        <!-- Upload Progress -->
        <div class="upload-progress" id="upload-progress">
            <div class="upload-progress-header">
                <span class="upload-progress-filename" id="upload-filename">filename.pdf</span>
                <span class="upload-progress-percent" id="upload-percent">0%</span>
            </div>
            <div class="upload-progress-bar">
