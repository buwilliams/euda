        function discussTask(description) {
            contextInput.value = `Tell me about the task: ${description}`;
            switchTab('chat');
            sendContextMessage();
        }

        function showFullContent(title, content, type = 'task') {
            // Show full content in chat area as a system message (not logged to lifelog)
            switchTab('chat');

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message message-system';
            messageDiv.innerHTML = `
                <div class="message-system-header">
                    <span class="message-system-title">${escapeHtml(title)}</span>
                    <button class="message-system-close" onclick="this.closest('.message-system').remove()">×</button>
                </div>
                <div class="message-system-body">${type === 'notes' ? marked.parse(content) : escapeHtml(content)}</div>
            `;

            inlineMessages.appendChild(messageDiv);
            scrollChatToBottom();
        }

        function scrollChatToBottom() {
            const chatPane = document.getElementById('tab-chat');
            if (chatPane) chatPane.scrollTop = chatPane.scrollHeight;
        }

        function showTaskById(taskId) {
            // Look up task in tasksData or completedTasksData and show in chat
            const task = tasksData.find(t => t.id === taskId) || completedTasksData.find(t => t.id === taskId);
            if (!task) return;
            const displayName = task.name || task.description || 'Untitled';
            const description = task.description || '';
            showTaskFullContent(displayName, description, task.project_title || 'General');
        }

        function showTaskFullContent(taskName, description, projectName) {
            // Show task with project name in chat area, rendering markdown
            switchTab('chat');

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message message-system';
            messageDiv.innerHTML = `
                <div class="message-system-header">
                    <span class="message-system-title">${escapeHtml(projectName)}: ${escapeHtml(taskName)}</span>
                    <button class="message-system-close" onclick="this.closest('.message-system').remove()">×</button>
                </div>
                ${description ? `<div class="message-system-body">${marked.parse(description)}</div>` : ''}
            `;

            inlineMessages.appendChild(messageDiv);
            scrollChatToBottom();
        }

        function showProjectNotesList(projectId, projectName, notes) {
            // Show project notes as a list of note cards
            switchTab('chat');

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message message-system';
            messageDiv.id = `notes-list-${projectId}`;

            let notesHtml;
            if (!notes || notes.length === 0) {
                notesHtml = '<em>No notes yet</em>';
            } else {
                notesHtml = notes.map(note => `
                    <div class="note-card" data-note-filename="${note.filename}">
                        <div class="note-card-header">
                            <span class="note-card-date">${escapeHtml(note.date)}</span>
                            <span class="note-card-type">${escapeHtml(note.type)}</span>
                        </div>
                        <div class="note-card-title">${escapeHtml(note.title)}</div>
                        <div class="note-card-preview">${escapeHtml(note.preview)}</div>
                        <div class="note-card-actions">
                            <button class="note-action-btn" onclick="viewNoteDetail('${projectId}', '${note.filename}')">View</button>
                            <button class="note-action-btn" onclick="bringNoteToChat('${escapeHtml(projectName).replace(/'/g, "\\'")}', '${escapeHtml(note.title).replace(/'/g, "\\'")}', '${escapeHtml(note.preview).replace(/'/g, "\\'")}')">Chat</button>
                            <button class="note-action-btn delete" onclick="deleteProjectNote('${projectId}', '${note.filename}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            }

            messageDiv.innerHTML = `
                <div class="message-system-header">
                    <span class="message-system-title">${escapeHtml(projectName)} - Notes (${notes.length})</span>
                    <button class="message-system-close" onclick="this.closest('.message-system').remove()">×</button>
                </div>
                <div class="message-system-body notes-list-body">
                    ${notesHtml}
                </div>
            `;

            inlineMessages.appendChild(messageDiv);
            scrollChatToBottom();
        }

        async function viewNoteDetail(projectId, filename) {
            // Fetch note details and show full content
            try {
                const response = await fetch(`/api/projects/${projectId}/notes/list`);
                const data = await response.json();
                const note = data.notes.find(n => n.filename === filename);

                if (note) {
                    switchTab('chat');
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'message message-system';
                    messageDiv.innerHTML = `
                        <div class="message-system-header">
                            <span class="message-system-title">${escapeHtml(note.date)} - ${escapeHtml(note.title)}</span>
                            <button class="message-system-close" onclick="this.closest('.message-system').remove()">×</button>
                        </div>
                        <div class="message-system-body">${marked.parse(note.content || '*No content*')}</div>
                    `;
                    inlineMessages.appendChild(messageDiv);
                    scrollChatToBottom();
                }
            } catch (error) {
                console.error('Failed to load note detail:', error);
            }
        }

        function bringNoteToChat(projectName, noteTitle, notePreview) {
            // Quote note and ask what user wants to do
            const message = `Regarding this note from "${projectName}":\n\n> **${noteTitle}**\n> ${notePreview}\n\nWhat would you like to do with this?`;
            contextInput.value = message;
            contextInput.focus();
            // Auto-expand textarea
            contextInput.style.height = 'auto';
            contextInput.style.height = Math.min(contextInput.scrollHeight, 200) + 'px';
        }

        async function deleteProjectNote(projectId, filename) {
            if (!confirm('Delete this note?')) return;

            try {
                const response = await fetch(`/api/projects/${projectId}/notes/${filename}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    // Clear the expanded state for this note
                    expandedCards.delete(`note-${filename}`);
                    // Reload data to refresh notes list
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to delete note:', error);
            }
        }

        async function addTaskToProject(projectId, inputEl) {
            const description = inputEl.value.trim();
            if (!description) return;

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        description: description,
                        project_id: projectId,
                        priority: 'medium'
                    })
                });

                if (response.ok) {
                    inputEl.value = '';
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to add task:', error);
            }
        }

        function updateTasksBadge() {
            const badge = document.getElementById('tasks-badge');
            const today = new Date().toISOString().split('T')[0];
            // Count only tasks with due_date = today (not tasks without dates)
            const count = tasksData.filter(t => {
                const dueDate = t.scheduling?.due_date;
                const isToday = dueDate === today;
                const isPending = t.status === 'pending' || t.status === 'in_progress';
                // Exclude system project tasks (notifications, recommendations)
                const isSystemProject = t.project_id === 'project-notifications' || t.project_id === 'project-recommendations';
                return isToday && isPending && !isSystemProject;
            }).length;
            badge.textContent = count;
            badge.style.display = count > 0 ? 'inline' : 'none';
        }

        // ============== File Upload ==============

        function triggerUpload() {
            document.getElementById('file-input').click();
        }

        let uploadQueue = [];
        let uploadTotal = 0;
        let uploadCurrent = 0;

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (!files.length) return;
            event.target.value = '';
            queueUploads(files);
        }

        function queueUploads(files) {
            uploadQueue = uploadQueue.concat(files);
            uploadTotal = uploadQueue.length;
            uploadCurrent = 0;
            processUploadQueue();
        }

        function processUploadQueue() {
            if (uploadQueue.length === 0) {
                uploadTotal = 0;
                uploadCurrent = 0;
                return;
            }

            const file = uploadQueue.shift();
            uploadCurrent++;
            uploadFile(file);
        }

        function uploadFile(file) {
            const progressEl = document.getElementById('upload-progress');
            const filenameEl = document.getElementById('upload-filename');
            const percentEl = document.getElementById('upload-percent');
            const fillEl = document.getElementById('upload-fill');
            const statusEl = document.getElementById('upload-status');
            const uploadBtn = document.getElementById('upload-btn');

            const queueStatus = uploadTotal > 1 ? ` (${uploadCurrent}/${uploadTotal})` : '';
            filenameEl.textContent = file.name + queueStatus;
            percentEl.textContent = '0%';
            fillEl.style.width = '0%';
            statusEl.textContent = 'Uploading...';
            progressEl.classList.add('active');
            uploadBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            uploadXhr = new XMLHttpRequest();

            uploadXhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    percentEl.textContent = percent + '%';
                    fillEl.style.width = percent + '%';

                    if (e.total > 1024 * 1024) {
                        const loadedMB = (e.loaded / (1024 * 1024)).toFixed(1);
                        const totalMB = (e.total / (1024 * 1024)).toFixed(1);
                        statusEl.textContent = `${loadedMB} MB / ${totalMB} MB`;
                    }
                }
            };

            uploadXhr.onload = function() {
                if (uploadXhr.status === 200) {
                    try {
                        const response = JSON.parse(uploadXhr.responseText);
                        statusEl.textContent = 'Complete!';
                        fillEl.style.width = '100%';
                        percentEl.textContent = '100%';

                        switchTab('chat');
                        addInlineMessage(`Uploaded: ${file.name}`, 'you');
                        addInlineMessage(response.message || `File "${response.filename}" uploaded.`, 'friend');
                    } catch (e) {
                        statusEl.textContent = 'Upload complete';
                    }
                } else {
                    statusEl.textContent = 'Upload failed';
                    switchTab('chat');
                    addInlineMessage(`Upload failed: ${file.name}`, 'you');
                    addInlineMessage('Sorry, the upload failed. Please try again.', 'friend');
                }

                uploadXhr = null;

                // Process next file in queue
                if (uploadQueue.length > 0) {
                    setTimeout(processUploadQueue, 500);
                } else {
                    uploadBtn.disabled = false;
                    setTimeout(() => progressEl.classList.remove('active'), 1500);
                }
            };

            uploadXhr.onerror = function() {
                statusEl.textContent = 'Network error';
                switchTab('chat');
                addInlineMessage(`Upload failed: ${file.name}`, 'friend');
                uploadXhr = null;

                // Continue with next file despite error
                if (uploadQueue.length > 0) {
                    setTimeout(processUploadQueue, 500);
                } else {
                    uploadBtn.disabled = false;
                    setTimeout(() => progressEl.classList.remove('active'), 2000);
                }
            };

            uploadXhr.open('POST', '/api/upload');
            uploadXhr.send(formData);
        }

        // ============== SSE ==============

        let eventSource = null;
        let reconnectAttempts = 0;

        function connectSSE() {
            if (eventSource) eventSource.close();

            eventSource = new EventSource('/api/events');

            eventSource.addEventListener('init', (e) => {
                const data = JSON.parse(e.data);
                const allTasks = data.tasks || [];
                // Split tasks into active and completed (filter out archived)
                tasksData = allTasks.filter(t => t.status !== 'completed' && t.status !== 'archived');
                completedTasksData = allTasks.filter(t => t.status === 'completed')
                    .sort((a, b) => (b.completed_at || '').localeCompare(a.completed_at || ''))
                    .slice(0, 20);
                projectsData = data.projects || [];
                updateTasksBadge();
                if (activeTab === 'focus') {
                    renderFocusTab();
                }
                reconnectAttempts = 0;
            });

            eventSource.addEventListener('tasks_update', (e) => {
                const data = JSON.parse(e.data);
                const allTasks = data.tasks || [];
                // Split tasks into active and completed (filter out archived)
                tasksData = allTasks.filter(t => t.status !== 'completed' && t.status !== 'archived');
                completedTasksData = allTasks.filter(t => t.status === 'completed')
                    .sort((a, b) => (b.completed_at || '').localeCompare(a.completed_at || ''))
                    .slice(0, 20);
                if (activeTab === 'focus') {
                    renderFocusTab();
                }
                updateTasksBadge();
            });

            eventSource.addEventListener('projects_update', (e) => {
                const data = JSON.parse(e.data);
                projectsData = data.projects || [];
                if (activeTab === 'focus') {
                    renderFocusTab();
                }
            });

            eventSource.addEventListener('ping', () => {});

            eventSource.onerror = () => {
                eventSource.close();
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                reconnectAttempts++;
                setTimeout(connectSSE, delay);
            };
        }

        // ============== Drag and Drop ==============

        const appEl = document.querySelector('.app');

        appEl.addEventListener('dragover', (e) => {
            e.preventDefault();
            appEl.classList.add('drag-over');
        });

        appEl.addEventListener('dragleave', (e) => {
            e.preventDefault();
            appEl.classList.remove('drag-over');
        });

        appEl.addEventListener('drop', (e) => {
            e.preventDefault();
            appEl.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) {
                queueUploads(Array.from(e.dataTransfer.files));
            }
        });

        // Initialize
        init();
    </script>
</body>
</html>
