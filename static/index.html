<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Euno - Personal Intelligence</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- CSS Modules (order matters) -->
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/focus.css">
    <link rel="stylesheet" href="/static/css/focus-cards.css">
    <link rel="stylesheet" href="/static/css/focus-detail.css">
    <link rel="stylesheet" href="/static/css/focus-markdown.css">
    <link rel="stylesheet" href="/static/css/focus-assets.css">
    <link rel="stylesheet" href="/static/css/focus-modals.css">
    <link rel="stylesheet" href="/static/css/focus-forms.css">
    <link rel="stylesheet" href="/static/css/focus-extras.css">
    <link rel="stylesheet" href="/static/css/when-picker.css">
    <link rel="stylesheet" href="/static/css/history.css">
    <link rel="stylesheet" href="/static/css/about.css">
    <link rel="stylesheet" href="/static/css/auth.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* API Costs - inline for specificity */
        .costs-box { display:flex; flex-direction:column; border:1px solid #e0e0e0; overflow:hidden; }
        .costs-tabs { display:flex; align-items:stretch; background:#f5f5f5; border-bottom:1px solid #e0e0e0; }
        .costs-tab { flex:1; display:flex; align-items:center; justify-content:center; padding:0.6rem 0.75rem; font-size:0.85rem; font-family:inherit; background:#f0f0f0; color:#666; border:none; border-right:1px solid #ddd; border-radius:0; cursor:pointer; transition:all 0.15s ease; -webkit-appearance:none; appearance:none; outline:none; margin:0; }
        .costs-tab:last-child { border-right:none; }
        .costs-tab:hover { background:#e8e8e8; color:#333; }
        .costs-tab.active { background:#f8f8f8; color:#333; margin-bottom:-1px; padding-bottom:calc(0.6rem + 1px); border-bottom:1px solid #f8f8f8; }
        .costs-display { text-align:center; padding:1.5rem 1rem; background:#f8f8f8; }
        .costs-amount { font-size:2.5rem; font-weight:300; color:#333; margin-bottom:0.35rem; }
        .costs-calls { font-size:0.85rem; color:#888; }
        .costs-budget { text-align:center; font-size:0.85rem; color:#666; padding:0.75rem 1rem; background:#f9f9f9; border-top:1px solid #eee; }
        .costs-budget:empty { display:none; }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splash-screen">
        <div class="splash-content">
            <h1 class="splash-title" id="splash-title">
                <span class="splash-letter">E</span><span class="splash-letter">u</span><span class="splash-letter">n</span><span class="splash-letter">o</span>
            </h1>
            <p class="splash-tagline" id="splash-tagline">PERSONAL INTELLIGENCE</p>
            <p class="splash-pronunciation" id="splash-pronunciation">(you-know)</p>
        </div>
    </div>

    <!-- Login Overlay -->
    <div class="login-overlay hidden" id="login-overlay">
        <div class="login-box">
            <h1 class="login-title">Euno</h1>
            <p class="login-subtitle">Personal Intelligence</p>
            <form onsubmit="handleLogin(event)">
                <input type="password" class="login-input" id="login-password" placeholder="Password" autocomplete="current-password" autofocus>
                <button type="submit" class="login-btn" id="login-btn">Sign In</button>
            </form>
            <div class="login-error" id="login-error"></div>
        </div>
    </div>

    <div class="app-container" id="app-container">
        <div class="app">
            <!-- Tabs Container -->
            <div class="tabs-container">
                <div class="tab-content">
                    <!-- Focus Tab -->
                    <div class="tab-pane active" id="tab-focus">
                        <div class="focus-content" id="focus-content">
                            <!-- Content dynamically rendered by renderFocusTab() -->
                        </div>
                    </div>

                    <!-- Chat Tab -->
                    <div class="tab-pane" id="tab-chat">
                        <div class="chat-content">
                            <div class="inline-chat-messages" id="inline-messages"></div>
                        </div>
                    </div>

                    <!-- History Tab -->
                    <div class="tab-pane" id="tab-history">
                        <div class="history-content" id="history-list">
                            <div class="focus-empty">Loading...</div>
                        </div>
                    </div>

                    <!-- About Tab -->
                    <div class="tab-pane" id="tab-about">
                        <div class="about-content" id="about-content">
                            <div class="focus-empty">Loading...</div>
                        </div>
                    </div>

                    <!-- Settings Tab -->
                    <div class="tab-pane" id="tab-settings">
                        <div class="settings-content" id="settings-content">
                            <!-- Account Section -->
                            <div class="settings-section">
                                <h3 class="settings-section-title">Account</h3>
                                <button class="settings-btn" onclick="logout()">Sign Out</button>
                            </div>

                            <!-- Change Password Section -->
                            <div class="settings-section">
                                <h3 class="settings-section-title">Change Password</h3>
                                <form onsubmit="handleChangePassword(event)" class="settings-form">
                                    <input type="password" class="settings-input" id="current-password" placeholder="Current password" autocomplete="current-password">
                                    <input type="password" class="settings-input" id="new-password" placeholder="New password" autocomplete="new-password">
                                    <input type="password" class="settings-input" id="confirm-password" placeholder="Confirm new password" autocomplete="new-password">
                                    <button type="submit" class="settings-btn">Update Password</button>
                                    <div class="settings-message" id="password-message"></div>
                                </form>
                            </div>

                            <!-- AI Provider Section -->
                            <div class="settings-section">
                                <h3 class="settings-section-title">AI Provider</h3>
                                <div class="settings-form">
                                    <label class="settings-label">Default Provider</label>
                                    <select class="settings-select" id="default-provider" onchange="handleProviderChange()">
                                        <!-- Options populated dynamically from API -->
                                    </select>
                                    <div class="settings-message" id="ai-message"></div>
                                </div>
                            </div>

                            <!-- API Costs Section -->
                            <div class="settings-section">
                                <h3 class="settings-section-title">API Costs</h3>
                                <div class="costs-box">
                                    <div class="costs-tabs">
                                        <button class="costs-tab active" data-period="session" onclick="selectCostPeriod('session')">Session</button>
                                        <button class="costs-tab" data-period="seven_days" onclick="selectCostPeriod('seven_days')">7 Days</button>
                                        <button class="costs-tab" data-period="month" onclick="selectCostPeriod('month')">Month</button>
                                    </div>
                                    <div class="costs-display">
                                        <div class="costs-amount" id="costs-amount">—</div>
                                        <div class="costs-calls" id="costs-calls">Loading...</div>
                                    </div>
                                    <div class="costs-budget" id="costs-budget"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab Menu (below content) -->
                <div class="tab-menu">
                    <button class="tab-btn active" data-tab="focus" onclick="switchTab('focus')">
                        <img src="/static/icons/queue-list.svg" alt="Focus">
                        <span>Focus</span>
                        <span class="tab-badge" id="tasks-badge" style="display: none;">0</span>
                    </button>
                    <button class="tab-btn" data-tab="chat" onclick="switchTab('chat')">
                        <img src="/static/icons/chat-bubble-left.svg" alt="Chat">
                        <span>Chat</span>
                    </button>
                    <div class="tab-overflow">
                        <button class="tab-btn" onclick="toggleOverflowMenu()" id="overflow-btn">
                            <img src="/static/icons/ellipsis-vertical.svg" alt="More">
                            <span>More</span>
                        </button>
                        <div class="overflow-menu" id="overflow-menu">
                            <button class="overflow-item" data-tab="history" onclick="switchTab('history'); closeOverflowMenu();">
                                <img src="/static/icons/clock.svg" alt="History">
                                <span>History</span>
                            </button>
                            <button class="overflow-item" id="upload-btn" onclick="triggerUpload(); closeOverflowMenu();">
                                <img src="/static/icons/arrow-up-tray.svg" alt="Upload">
                                <span>Upload</span>
                            </button>
                            <button class="overflow-item" data-tab="about" onclick="switchTab('about'); closeOverflowMenu();">
                                <img src="/static/icons/information-circle.svg" alt="About">
                                <span>About</span>
                            </button>
                            <button class="overflow-item" data-tab="settings" onclick="switchTab('settings'); closeOverflowMenu();">
                                <img src="/static/icons/cog-6-tooth.svg" alt="Settings">
                                <span>Settings</span>
                            </button>
                            <button class="overflow-item" onclick="resetUI(); closeOverflowMenu();">
                                <img src="/static/icons/arrow-path.svg" alt="New Chat">
                                <span>New Chat</span>
                            </button>
                        </div>
                    </div>
                    <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(event)" multiple>
                </div>
            </div>

            <!-- Input Bar (always visible) -->
            <div class="input-bar">
                <textarea id="context-input" placeholder="What's on your mind?" rows="1"></textarea>
                <button id="context-send-btn" onclick="sendContextMessage()" title="Send">
                    <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>

        <!-- Upload Progress -->
        <div class="upload-progress" id="upload-progress">
            <div class="upload-progress-header">
                <span class="upload-progress-filename" id="upload-filename">filename.pdf</span>
                <span class="upload-progress-percent" id="upload-percent">0%</span>
            </div>
            <div class="upload-progress-bar">
                <div class="upload-progress-fill" id="upload-fill"></div>
            </div>
            <div class="upload-progress-status" id="upload-status">Uploading...</div>
        </div>
    </div>

    <!-- JavaScript Modules (order matters) -->
    <script src="/static/js/state.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/tabs.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/focus.js"></script>
    <script src="/static/js/focus-data.js"></script>
    <script src="/static/js/focus-cards.js"></script>
    <script src="/static/js/focus-views.js"></script>
    <script src="/static/js/focus-pickers.js"></script>
    <script src="/static/js/focus-actions.js"></script>
    <script src="/static/js/focus-editing.js"></script>
    <script src="/static/js/focus-assets.js"></script>
    <script src="/static/js/focus-screens.js"></script>
    <script src="/static/js/history.js"></script>
    <script src="/static/js/about.js"></script>
    <script src="/static/js/upload.js"></script>
    <script src="/static/js/splash.js"></script>
    <script src="/static/js/init.js"></script>
</body>
</html>
