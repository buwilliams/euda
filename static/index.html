    <script>
        // Configure marked
        marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

        // State
        let sessionId = localStorage.getItem('sessionId') || null;
        let viewingHistorySessionId = null;  // Track which history conversation is being viewed
        let isWaiting = false;
        let activeTab = localStorage.getItem('activeTab') || 'chat';
        let expandedCards = new Set();  // Track which cards are expanded
        let tasksData = [];
        let projectsData = [];
        let projectNotesData = {};
        let historyData = [];
        let uploadXhr = null;

        // Elements
        const appContainer = document.getElementById('app-container');
        const contextContent = document.getElementById('context-content');

        // Initialize
        async function init() {
            // Restore section collapse states
            restoreSectionStates();

            // Restore active tab
            switchTab(activeTab, false);

            // Load daily quote
            loadDailyQuote();

            // Connect SSE
            connectSSE();

            // Load tasks data for badge
            loadTasksData();
        }

        // ============== Tab Functions ==============

        function switchTab(tabName, saveState = true) {
            // Hide all panes and deactivate all buttons
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            // Show selected pane and activate button
            const pane = document.getElementById(`tab-${tabName}`);
            const btn = document.querySelector(`[data-tab="${tabName}"]`);
            if (pane) pane.classList.add('active');
            if (btn) btn.classList.add('active');

            activeTab = tabName;
            if (saveState) {
                localStorage.setItem('activeTab', tabName);
            }

            // Load data for tab
            if (tabName === 'focus') loadTasksData();
            if (tabName === 'history') loadHistoryData();
        }

        // ============== Daily Quote ==============

        async function loadDailyQuote() {
            // Show loading state
            contextContent.innerHTML = `
                <div class="quote-container">
                    <div class="quote-loading">Loading today's reflection...</div>
                </div>
            `;

            try {
                const response = await fetch('/api/daily-quote');
                const data = await response.json();
                renderQuote(data);
            } catch (error) {
                console.error('Failed to load daily quote:', error);
                // Fallback
                renderQuote({
                    quote: "The only way to do great work is to love what you do.",
                    author: "Steve Jobs"
                });
            }
        }

        function renderQuote(data) {
            contextContent.innerHTML = `
                <div class="quote-container">
                    <div class="quote-text">"${escapeHtml(data.quote)}"</div>
                    <div class="quote-author">— ${escapeHtml(data.author)}</div>
                </div>
            `;
        }

        // ============== Inline Chat ==============

        const contextInput = document.getElementById('context-input');
        const contextSendBtn = document.getElementById('context-send-btn');
        const inlineMessages = document.getElementById('inline-messages');

        async function sendContextMessage() {
            const message = contextInput.value.trim();
            if (!message || isWaiting) return;

            // Switch to chat tab if not already there
            if (activeTab !== 'chat') {
                switchTab('chat');
            }

            // Add user message
            addInlineMessage(message, 'you');
            contextInput.value = '';
            contextInput.style.height = 'auto';
            setContextWaiting(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                const data = await response.json();

                if (!response.ok) {
                    removeInlineThinking();
                    addInlineMessage(`Something went wrong: ${data.detail || 'Unknown error'}`, 'friend');
                    setContextWaiting(false);
                    return;
                }

                sessionId = data.session_id;
                localStorage.setItem('sessionId', sessionId);

                removeInlineThinking();
                addInlineMessage(data.response, 'friend');

                // If the agent cleared the conversation, clear the UI after showing the response
                if (data.clear_chat) {
                    setTimeout(() => {
                        inlineMessages.innerHTML = '';
                        loadDailyQuote();
                    }, 1500);  // Brief delay so user sees the confirmation
                }
            } catch (error) {
                console.error('Chat error:', error);
                removeInlineThinking();
                addInlineMessage('I had trouble processing that. Could you try again?', 'friend');
            }

            setContextWaiting(false);
            contextInput.focus();
        }

        function addInlineMessage(content, role) {
            const div = document.createElement('div');
            div.className = `inline-message inline-message-${role}`;
            const html = role === 'friend' ? marked.parse(content) : escapeHtml(content);
            div.innerHTML = `<div class="message-content">${html}</div>`;
            inlineMessages.appendChild(div);
            // Scroll to bottom of chat tab
            const chatPane = document.getElementById('tab-chat');
            if (chatPane) chatPane.scrollTop = chatPane.scrollHeight;
        }

        function addInlineThinking() {
            const div = document.createElement('div');
            div.className = 'inline-message inline-message-friend';
            div.id = 'inline-thinking';
            div.innerHTML = `<div class="message-content" style="color: #999; font-style: italic;">Thinking<span class="thinking-dots"><span></span><span></span><span></span></span></div>`;
            inlineMessages.appendChild(div);
            const chatPane = document.getElementById('tab-chat');
            if (chatPane) chatPane.scrollTop = chatPane.scrollHeight;
        }

        function removeInlineThinking() {
            const el = document.getElementById('inline-thinking');
            if (el) el.remove();
        }

        function setContextWaiting(waiting) {
            isWaiting = waiting;
            contextInput.disabled = waiting;
            contextSendBtn.disabled = waiting;
            if (waiting) addInlineThinking();
        }

        // Auto-expand context textarea
        contextInput.addEventListener('input', () => {
            contextInput.style.height = 'auto';
            contextInput.style.height = Math.min(contextInput.scrollHeight, 200) + 'px';
        });

        // Enter to send in context input
        contextInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !isWaiting) {
                e.preventDefault();
                sendContextMessage();
            }
        });

        // ============== Chat Overlay (Legacy) ==============

        function openChat() {
            // Now just focus the inline input
            contextInput.focus();
        }

        function openChatWith(message) {
            contextInput.value = message;
            contextInput.focus();
        }

        function sendPrompt(message) {
            contextInput.value = message;
            sendContextMessage();
        }

        function closeChat() {
            // No-op now
        }

        async function resetUI() {
            // Clear all messages
            inlineMessages.innerHTML = '';
            // Switch to chat tab
            switchTab('chat');
            // Reload the quote
            loadDailyQuote();
            // Clear expanded cards state
            expandedCards.clear();

            // Create a new session (old session preserved in history)
            try {
                const response = await fetch('/api/sessions/new', { method: 'POST' });
                if (response.ok) {
                    const data = await response.json();
                    sessionId = data.session_id;
                    localStorage.setItem('sessionId', sessionId);
                }
            } catch (error) {
                console.error('Failed to create new session:', error);
            }
        }

        // ============== Utility Functions ==============

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============== Section Toggle ==============

        function toggleSection(sectionName) {
            const section = document.getElementById(`section-${sectionName}`);
            if (section) {
                section.classList.toggle('collapsed');
                // Save state to localStorage
                const collapsed = JSON.parse(localStorage.getItem('collapsedSections') || '{}');
                collapsed[sectionName] = section.classList.contains('collapsed');
                localStorage.setItem('collapsedSections', JSON.stringify(collapsed));
            }
        }

        function restoreSectionStates() {
            const collapsed = JSON.parse(localStorage.getItem('collapsedSections') || '{}');
            for (const [sectionName, isCollapsed] of Object.entries(collapsed)) {
                const section = document.getElementById(`section-${sectionName}`);
                if (section) {
                    if (isCollapsed) {
                        section.classList.add('collapsed');
                    } else {
                        section.classList.remove('collapsed');
                    }
                }
            }
        }

        // ============== Tasks ==============

        let completedTasksData = [];

        async function loadTasksData() {
            try {
                const [tasksRes, projectsRes, completedRes] = await Promise.all([
                    fetch('/api/tasks'),
                    fetch('/api/projects'),
                    fetch('/api/tasks/completed?days=30&limit=20')
                ]);

                const tasksJson = await tasksRes.json();
                const projectsJson = await projectsRes.json();
                const completedJson = await completedRes.json();

                tasksData = tasksJson.tasks || [];
                projectsData = projectsJson.projects || [];
                completedTasksData = completedJson.tasks || [];

                // Load notes counts for each active project
                const activeProjects = projectsData.filter(p => p.status === 'active');
                const notesPromises = activeProjects.map(async (p) => {
                    try {
                        const res = await fetch(`/api/projects/${p.id}/notes`);
                        const data = await res.json();
                        projectNotesData[p.id] = { count: data.count || 0 };
                    } catch (e) {
                        projectNotesData[p.id] = { count: 0 };
                    }
                });
                await Promise.all(notesPromises);

                renderTodayTasks();
                renderProjects();
                renderCompletedTasks();
                updateTasksBadge();
            } catch (error) {
                console.error('Failed to load tasks data:', error);
            }
        }

        function renderTodayTasks() {
            const container = document.getElementById('today-tasks');
            const countEl = document.getElementById('today-count');

            const today = new Date().toISOString().split('T')[0];
            // Only show pending/in_progress tasks in Today section
            const todayTasks = tasksData.filter(t => {
                const dueDate = t.scheduling?.due_date;
                const isToday = dueDate === today || !dueDate;
                const isPending = t.status === 'pending' || t.status === 'in_progress';
                return isToday && isPending;
            });

            countEl.textContent = todayTasks.length;

            if (todayTasks.length === 0) {
                container.innerHTML = '<div class="focus-empty">No tasks for today</div>';
                return;
            }

            // Group tasks by project
            const tasksByProject = {};
            todayTasks.forEach(task => {
                const projectName = task.project_title || 'General';
                if (!tasksByProject[projectName]) {
                    tasksByProject[projectName] = [];
                }
                tasksByProject[projectName].push(task);
            });

            // Sort projects: Euno first, then General, then alphabetically
            const sortedProjects = Object.keys(tasksByProject).sort((a, b) => {
                if (a === 'From Euno') return -1;
                if (b === 'From Euno') return 1;
                if (a === 'General') return 1;
                if (b === 'General') return -1;
                return a.localeCompare(b);
            });

            container.innerHTML = sortedProjects.map(projectName => {
                const tasks = tasksByProject[projectName];
                return `
                    <div class="project-group">
                        <div class="project-label">${escapeHtml(projectName)}</div>
                        ${tasks.map(task => renderTaskCard(task)).join('')}
                    </div>
                `;
            }).join('');
        }

        function renderTaskCard(task) {
            const isExpanded = expandedCards.has(`task-${task.id}`);

            if (isExpanded) {
                return renderFullTaskCard(task);
            } else {
                return renderMinimalTaskCard(task);
            }
        }

        function renderMinimalTaskCard(task) {
            return `
                <div class="card card-minimal" data-task-id="${task.id}" onclick="expandTaskCard('${task.id}')">
                    <span class="card-title">${escapeHtml(task.description)}</span>
                </div>
            `;
        }

        function renderFullTaskCard(task) {
            const projectName = task.project_title || 'General';
            const dueDate = task.scheduling?.due_date || 'No due date';
            return `
                <div class="card card-full" data-task-id="${task.id}">
                    <div class="card-header">
                        <span class="card-title">${escapeHtml(task.description)}</span>
                        <button class="card-collapse" onclick="event.stopPropagation(); collapseTaskCard('${task.id}')">−</button>
                    </div>
                    <div class="card-body">
                        <div class="card-meta">Project: ${escapeHtml(projectName)} • Due: ${escapeHtml(dueDate)}</div>
                    </div>
                    <div class="card-actions">
                        <button class="card-action" onclick="toggleTask(event, '${task.id}')">Complete</button>
                        <button class="card-action" onclick="snoozeTask(event, '${task.id}')">Snooze</button>
                        <button class="card-action" onclick="archiveTask(event, '${task.id}')">Archive</button>
                        <button class="card-action danger" onclick="deleteTask(event, '${task.id}')">Delete</button>
                    </div>
                </div>
            `;
        }

        function expandTaskCard(taskId) {
            expandedCards.add(`task-${taskId}`);
            renderTodayTasks();
            renderProjects();
            renderCompletedTasks();
        }

        function collapseTaskCard(taskId) {
            expandedCards.delete(`task-${taskId}`);
            renderTodayTasks();
            renderProjects();
            renderCompletedTasks();
        }

        function renderProjects() {
            const container = document.getElementById('projects-list');
            const countEl = document.getElementById('projects-count');

            const activeProjects = projectsData.filter(p => p.status === 'active');
            countEl.textContent = activeProjects.length;

            if (activeProjects.length === 0) {
                container.innerHTML = '<div class="focus-empty">No active projects</div>';
                return;
            }

            container.innerHTML = activeProjects.map(project => renderProjectCard(project)).join('');
        }

        function renderProjectCard(project) {
            const isExpanded = expandedCards.has(`project-${project.id}`);

            if (isExpanded) {
                return renderFullProjectCard(project);
            } else {
                return renderMinimalProjectCard(project);
            }
        }

        function renderMinimalProjectCard(project) {
            const projectTasks = tasksData.filter(t => t.project_id === project.id && t.status !== 'completed');
            return `
                <div class="card card-minimal" data-project-id="${project.id}" onclick="expandProjectCard('${project.id}')">
                    <span class="card-title">${escapeHtml(project.title)}</span>
                    <span class="card-badge">${projectTasks.length} task${projectTasks.length !== 1 ? 's' : ''}</span>
                </div>
            `;
        }

        function renderFullProjectCard(project) {
            const projectTasks = tasksData.filter(t => t.project_id === project.id && t.status !== 'completed');
            const noteCount = projectNotesData[project.id]?.count || 0;
            const isGeneral = project.id === 'project-general';

            return `
                <div class="card card-full" data-project-id="${project.id}">
                    <div class="card-header">
                        <span class="card-title">${escapeHtml(project.title)}</span>
                        <button class="card-collapse" onclick="event.stopPropagation(); collapseProjectCard('${project.id}')">−</button>
                    </div>
                    <div class="card-body">
                        <div class="card-meta">${projectTasks.length} pending task${projectTasks.length !== 1 ? 's' : ''} • ${noteCount} note${noteCount !== 1 ? 's' : ''}</div>
                        <div class="card-tasks">
                            ${projectTasks.length === 0
                                ? '<div class="focus-empty">No pending tasks</div>'
                                : projectTasks.map(task => renderTaskCard(task)).join('')
                            }
                        </div>
                        <div class="card-add-task">
                            <input type="text" class="card-add-input" id="add-task-${project.id}" placeholder="Add task..." onkeypress="if(event.key==='Enter')addTaskToProject('${project.id}', this)">
                            <button class="card-add-btn" onclick="addTaskToProject('${project.id}', document.getElementById('add-task-${project.id}'))">+</button>
                        </div>
                        ${noteCount > 0 ? `
                        <div class="card-notes">
                            <div class="card-notes-header">Notes</div>
                            <button class="card-action" onclick="toggleProjectNotes('${project.id}')">View ${noteCount} note${noteCount !== 1 ? 's' : ''}</button>
                        </div>
                        ` : ''}
                    </div>
                    ${!isGeneral ? `
                    <div class="card-actions">
                        <button class="card-action" onclick="archiveProject('${project.id}')">Archive</button>
                        <button class="card-action danger" onclick="deleteProject('${project.id}')">Delete</button>
                    </div>
                    ` : ''}
                </div>
            `;
        }

        function expandProjectCard(projectId) {
            expandedCards.add(`project-${projectId}`);
            renderProjects();
        }

        function collapseProjectCard(projectId) {
            expandedCards.delete(`project-${projectId}`);
            renderProjects();
        }

        async function deleteProject(projectId) {
            if (!confirm('Delete this project and all its tasks?')) return;

            try {
                const response = await fetch(`/api/projects/${projectId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to delete project:', error);
            }
        }

        async function toggleProjectNotes(projectId) {
            // Find the project name
            const project = projectsData.find(p => p.id === projectId);
            const projectName = project ? project.title : 'Project';

            try {
                // Use the new structured notes list endpoint
                const response = await fetch(`/api/projects/${projectId}/notes/list`);
                const data = await response.json();

                // Show notes as list in chat area
                showProjectNotesList(projectId, projectName, data.notes);

                // Update cached count
                projectNotesData[projectId] = { count: data.count };
            } catch (error) {
                console.error('Failed to load notes:', error);
                showProjectNotesList(projectId, projectName, []);
            }
        }

        async function snoozeTask(event, taskId) {
            event.stopPropagation();

            try {
                const response = await fetch(`/api/tasks/${taskId}/snooze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})  // Default: snooze until tomorrow
                });

                if (response.ok) {
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to snooze task:', error);
            }
        }

        async function archiveTask(event, taskId) {
            event.stopPropagation();

            const reason = prompt('Reason for archiving (optional):');
            if (reason === null) return; // Cancelled

            try {
                const response = await fetch(`/api/tasks/${taskId}/archive`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason, outcome: 'abandoned' })
                });

                if (response.ok) {
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to archive task:', error);
            }
        }

        async function archiveProject(projectId) {
            const reason = prompt('Reason for archiving (optional):');
            if (reason === null) return; // Cancelled

            const outcome = confirm('Was this project completed?') ? 'completed' : 'abandoned';

            try {
                const response = await fetch(`/api/projects/${projectId}/archive`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason, outcome })
                });

                if (response.ok) {
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to archive project:', error);
            }
        }

        async function completeProject(projectId) {
            try {
                const response = await fetch(`/api/projects/${projectId}/complete`, {
                    method: 'POST'
                });

                if (response.ok) {
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to complete project:', error);
            }
        }

        async function toggleTask(event, taskId) {
            event.stopPropagation();
            const task = tasksData.find(t => t.id === taskId) || completedTasksData.find(t => t.id === taskId);
            if (!task) return;

            const newStatus = task.status === 'completed' ? 'pending' : 'completed';

            try {
                const response = await fetch(`/api/tasks/${taskId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    // Reload data to reflect changes
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to update task status:', error);
            }
        }

        async function deleteTask(event, taskId) {
            event.stopPropagation();
            if (!confirm('Delete this task?')) return;

            try {
                const response = await fetch(`/api/tasks/${taskId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to delete task:', error);
            }
        }

        function renderCompletedTasks() {
            const container = document.getElementById('completed-tasks');
            const countEl = document.getElementById('completed-count');

            countEl.textContent = completedTasksData.length;

            if (completedTasksData.length === 0) {
                container.innerHTML = '<div class="focus-empty">No completed tasks</div>';
                return;
            }

            // Group by project
            const tasksByProject = {};
            completedTasksData.slice(0, 15).forEach(task => {
                const projectName = task.project_title || 'General';
                if (!tasksByProject[projectName]) {
                    tasksByProject[projectName] = [];
                }
                tasksByProject[projectName].push(task);
            });

            container.innerHTML = Object.entries(tasksByProject).map(([projectName, tasks]) => `
                <div class="project-group">
                    <div class="project-label">${escapeHtml(projectName)}</div>
                    ${tasks.map(task => renderCompletedTaskCard(task)).join('')}
                </div>
            `).join('');
        }

        function renderCompletedTaskCard(task) {
            const isExpanded = expandedCards.has(`completed-${task.id}`);

            if (isExpanded) {
                return `
                    <div class="card card-full" data-task-id="${task.id}" style="opacity: 0.7;">
                        <div class="card-header">
                            <span class="card-title" style="text-decoration: line-through;">${escapeHtml(task.description)}</span>
                            <button class="card-collapse" onclick="event.stopPropagation(); expandedCards.delete('completed-${task.id}'); renderCompletedTasks();">−</button>
                        </div>
                        <div class="card-body">
                            <div class="card-meta">Completed ${task.completed_at ? new Date(task.completed_at).toLocaleDateString() : 'recently'}</div>
                        </div>
                        <div class="card-actions">
                            <button class="card-action" onclick="toggleTask(event, '${task.id}')">Restore</button>
                            <button class="card-action danger" onclick="deleteTask(event, '${task.id}')">Delete</button>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="card card-minimal" data-task-id="${task.id}" onclick="expandedCards.add('completed-${task.id}'); renderCompletedTasks();" style="opacity: 0.7;">
                        <span class="card-title" style="text-decoration: line-through; color: #888;">${escapeHtml(task.description)}</span>
                    </div>
                `;
            }
        }

        // ============== History ==============

        async function loadHistoryData() {
            try {
                const response = await fetch('/api/conversations/recent/structured?count=20');
                const data = await response.json();
                historyData = data.conversations || [];
                renderHistory();
            } catch (error) {
                console.error('Failed to load history:', error);
                document.getElementById('history-list').innerHTML =
                    '<div class="history-empty">Failed to load history</div>';
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if (!historyData || historyData.length === 0) {
                container.innerHTML = '<div class="focus-empty">No conversations yet</div>';
                return;
            }
            container.innerHTML = historyData.map(item => renderHistoryCard(item)).join('');
        }

        function renderHistoryCard(item) {
            const isExpanded = expandedCards.has(`history-${item.session_id}`);

            if (isExpanded) {
                return `
                    <div class="card card-full" data-session-id="${item.session_id}">
                        <div class="card-header">
                            <span class="card-date">${item.date} at ${item.time}</span>
                            <button class="card-collapse" onclick="event.stopPropagation(); expandedCards.delete('history-${item.session_id}'); renderHistory();">−</button>
                        </div>
                        <div class="card-body">
                            <div class="card-preview" style="white-space: normal;">${escapeHtml(item.preview || 'No preview')}</div>
                            <div class="card-meta">${item.message_count || '?'} messages</div>
                        </div>
                        <div class="card-actions">
                            <button class="card-action primary" onclick="loadConversation('${item.session_id}')">Load</button>
                            <button class="card-action" onclick="archiveConversation('${item.session_id}')">Archive</button>
                            <button class="card-action danger" onclick="deleteConversation('${item.session_id}', event)">Delete</button>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="card card-minimal" data-session-id="${item.session_id}" onclick="expandedCards.add('history-${item.session_id}'); renderHistory();">
                        <span class="card-date">${item.date} ${item.time}</span>
                        <span class="card-preview">${escapeHtml(item.preview || 'No preview')}</span>
                    </div>
                `;
            }
        }

        async function loadConversation(oldSessionId) {
            try {
                const response = await fetch('/api/conversations/fork', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: oldSessionId })
                });
                if (!response.ok) throw new Error('Failed to fork');
                const data = await response.json();

                sessionId = data.new_session_id;
                localStorage.setItem('sessionId', sessionId);
                viewingHistorySessionId = oldSessionId;

                inlineMessages.innerHTML = '';
                for (const msg of data.messages) {
                    addInlineMessage(msg.content, msg.role === 'user' ? 'you' : 'friend');
                }

                // Switch to chat tab
                switchTab('chat');
                contextInput.focus();
            } catch (error) {
                console.error('Failed to load conversation:', error);
                alert('Failed to load conversation');
            }
        }

        // Legacy alias for forkConversation
        async function forkConversation(oldSessionId) {
            return loadConversation(oldSessionId);
        }

        async function archiveConversation(targetSessionId) {
            // For now, archive just deletes - could be enhanced to move to archive
            if (!confirm('Archive this conversation? (This will remove it from history)')) return;
            await deleteConversationById(targetSessionId);
        }

        async function deleteConversationById(targetSessionId) {
            try {
                const response = await fetch(`/api/conversations/${targetSessionId}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error('Failed to delete');

                // If we deleted the conversation we're currently viewing, clear the chat
                if (targetSessionId === viewingHistorySessionId) {
                    inlineMessages.innerHTML = '';
                    viewingHistorySessionId = null;
                }

                // Refresh history list
                await loadHistoryData();
            } catch (error) {
                console.error('Failed to delete conversation:', error);
                alert('Failed to delete conversation');
            }
        }

        async function deleteConversation(targetSessionId, event) {
            if (event) event.stopPropagation();
            if (!confirm('Delete this conversation permanently?')) return;
            await deleteConversationById(targetSessionId);
        }

        function discussTask(description) {
            contextInput.value = `Tell me about the task: ${description}`;
            switchTab('chat');
            sendContextMessage();
        }

        function showFullContent(title, content, type = 'task') {
            // Show full content in chat area as a system message (not logged to lifelog)
            switchTab('chat');

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message message-system';
            messageDiv.innerHTML = `
                <div class="message-system-header">
                    <span class="message-system-title">${escapeHtml(title)}</span>
                    <button class="message-system-close" onclick="this.closest('.message-system').remove()">×</button>
                </div>
                <div class="message-system-body">${type === 'notes' ? marked.parse(content) : escapeHtml(content)}</div>
            `;

            inlineMessages.appendChild(messageDiv);
            scrollChatToBottom();
        }

        function scrollChatToBottom() {
            const chatPane = document.getElementById('tab-chat');
            if (chatPane) chatPane.scrollTop = chatPane.scrollHeight;
        }

        function showTaskById(taskId) {
            // Look up task in tasksData or completedTasksData and show in chat
            const task = tasksData.find(t => t.id === taskId) || completedTasksData.find(t => t.id === taskId);
            if (!task) return;
            showTaskFullContent(task.description, task.project_title || 'General');
        }

        function showTaskFullContent(description, projectName) {
            // Show task with project name in chat area, rendering markdown
            switchTab('chat');

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message message-system';
            messageDiv.innerHTML = `
                <div class="message-system-header">
                    <span class="message-system-title">${escapeHtml(projectName)}</span>
                    <button class="message-system-close" onclick="this.closest('.message-system').remove()">×</button>
                </div>
                <div class="message-system-body">${marked.parse(description)}</div>
            `;

            inlineMessages.appendChild(messageDiv);
            scrollChatToBottom();
        }

        function showProjectNotesList(projectId, projectName, notes) {
            // Show project notes as a list of note cards
            switchTab('chat');

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message message-system';
            messageDiv.id = `notes-list-${projectId}`;

            let notesHtml;
            if (!notes || notes.length === 0) {
                notesHtml = '<em>No notes yet</em>';
            } else {
                notesHtml = notes.map(note => `
                    <div class="note-card" data-note-filename="${note.filename}">
                        <div class="note-card-header">
                            <span class="note-card-date">${escapeHtml(note.date)}</span>
                            <span class="note-card-type">${escapeHtml(note.type)}</span>
                        </div>
                        <div class="note-card-title">${escapeHtml(note.title)}</div>
                        <div class="note-card-preview">${escapeHtml(note.preview)}</div>
                        <div class="note-card-actions">
                            <button class="note-action-btn" onclick="viewNoteDetail('${projectId}', '${note.filename}')">View</button>
                            <button class="note-action-btn" onclick="bringNoteToChat('${escapeHtml(projectName).replace(/'/g, "\\'")}', '${escapeHtml(note.title).replace(/'/g, "\\'")}', '${escapeHtml(note.preview).replace(/'/g, "\\'")}')">Chat</button>
                            <button class="note-action-btn delete" onclick="deleteProjectNote('${projectId}', '${note.filename}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            }

            messageDiv.innerHTML = `
                <div class="message-system-header">
                    <span class="message-system-title">${escapeHtml(projectName)} - Notes (${notes.length})</span>
                    <button class="message-system-close" onclick="this.closest('.message-system').remove()">×</button>
                </div>
                <div class="message-system-body notes-list-body">
                    ${notesHtml}
                </div>
            `;

            inlineMessages.appendChild(messageDiv);
            scrollChatToBottom();
        }

        async function viewNoteDetail(projectId, filename) {
            // Fetch note details and show full content
            try {
                const response = await fetch(`/api/projects/${projectId}/notes/list`);
                const data = await response.json();
                const note = data.notes.find(n => n.filename === filename);

                if (note) {
                    switchTab('chat');
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'message message-system';
                    messageDiv.innerHTML = `
                        <div class="message-system-header">
                            <span class="message-system-title">${escapeHtml(note.date)} - ${escapeHtml(note.title)}</span>
                            <button class="message-system-close" onclick="this.closest('.message-system').remove()">×</button>
                        </div>
                        <div class="message-system-body">${marked.parse(note.content || '*No content*')}</div>
                    `;
                    inlineMessages.appendChild(messageDiv);
                    scrollChatToBottom();
                }
            } catch (error) {
                console.error('Failed to load note detail:', error);
            }
        }

        function bringNoteToChat(projectName, noteTitle, notePreview) {
            // Quote note and ask what user wants to do
            const message = `Regarding this note from "${projectName}":\n\n> **${noteTitle}**\n> ${notePreview}\n\nWhat would you like to do with this?`;
            contextInput.value = message;
            contextInput.focus();
            // Auto-expand textarea
            contextInput.style.height = 'auto';
            contextInput.style.height = Math.min(contextInput.scrollHeight, 200) + 'px';
        }

        async function deleteProjectNote(projectId, filename) {
            if (!confirm('Delete this note?')) return;

            try {
                const response = await fetch(`/api/projects/${projectId}/notes/${filename}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    // Refresh the notes list
                    const existingList = document.getElementById(`notes-list-${projectId}`);
                    if (existingList) existingList.remove();
                    await toggleProjectNotes(projectId);
                    // Update cached count
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to delete note:', error);
            }
        }

        async function addTaskToProject(projectId, inputEl) {
            const description = inputEl.value.trim();
            if (!description) return;

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        description: description,
                        project_id: projectId,
                        priority: 'medium'
                    })
                });

                if (response.ok) {
                    inputEl.value = '';
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to add task:', error);
            }
        }

        function updateTasksBadge() {
            const badge = document.getElementById('tasks-badge');
            const today = new Date().toISOString().split('T')[0];
            // Match the same logic as renderTodayTasks - pending OR in_progress
            const count = tasksData.filter(t => {
                const dueDate = t.scheduling?.due_date;
                const isToday = dueDate === today || !dueDate;
                const isPending = t.status === 'pending' || t.status === 'in_progress';
                return isToday && isPending;
            }).length;
            badge.textContent = count;
            badge.style.display = count > 0 ? 'inline' : 'none';
        }

        // ============== File Upload ==============

        function triggerUpload() {
            document.getElementById('file-input').click();
        }

        let uploadQueue = [];
        let uploadTotal = 0;
        let uploadCurrent = 0;

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (!files.length) return;
            event.target.value = '';
            queueUploads(files);
        }

        function queueUploads(files) {
            uploadQueue = uploadQueue.concat(files);
            uploadTotal = uploadQueue.length;
            uploadCurrent = 0;
            processUploadQueue();
        }

        function processUploadQueue() {
            if (uploadQueue.length === 0) {
                uploadTotal = 0;
                uploadCurrent = 0;
                return;
            }

            const file = uploadQueue.shift();
            uploadCurrent++;
            uploadFile(file);
        }

        function uploadFile(file) {
            const progressEl = document.getElementById('upload-progress');
            const filenameEl = document.getElementById('upload-filename');
            const percentEl = document.getElementById('upload-percent');
            const fillEl = document.getElementById('upload-fill');
            const statusEl = document.getElementById('upload-status');
            const uploadBtn = document.getElementById('upload-btn');

            const queueStatus = uploadTotal > 1 ? ` (${uploadCurrent}/${uploadTotal})` : '';
            filenameEl.textContent = file.name + queueStatus;
            percentEl.textContent = '0%';
            fillEl.style.width = '0%';
            statusEl.textContent = 'Uploading...';
            progressEl.classList.add('active');
            uploadBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            uploadXhr = new XMLHttpRequest();

            uploadXhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    percentEl.textContent = percent + '%';
                    fillEl.style.width = percent + '%';

                    if (e.total > 1024 * 1024) {
                        const loadedMB = (e.loaded / (1024 * 1024)).toFixed(1);
                        const totalMB = (e.total / (1024 * 1024)).toFixed(1);
                        statusEl.textContent = `${loadedMB} MB / ${totalMB} MB`;
                    }
                }
            };

            uploadXhr.onload = function() {
                if (uploadXhr.status === 200) {
                    try {
                        const response = JSON.parse(uploadXhr.responseText);
                        statusEl.textContent = 'Complete!';
                        fillEl.style.width = '100%';
                        percentEl.textContent = '100%';

                        switchTab('chat');
                        addInlineMessage(`Uploaded: ${file.name}`, 'you');
                        addInlineMessage(response.message || `File "${response.filename}" uploaded.`, 'friend');
                    } catch (e) {
                        statusEl.textContent = 'Upload complete';
                    }
                } else {
                    statusEl.textContent = 'Upload failed';
                    switchTab('chat');
                    addInlineMessage(`Upload failed: ${file.name}`, 'you');
                    addInlineMessage('Sorry, the upload failed. Please try again.', 'friend');
                }

                uploadXhr = null;

                // Process next file in queue
                if (uploadQueue.length > 0) {
                    setTimeout(processUploadQueue, 500);
                } else {
                    uploadBtn.disabled = false;
                    setTimeout(() => progressEl.classList.remove('active'), 1500);
                }
            };

            uploadXhr.onerror = function() {
                statusEl.textContent = 'Network error';
                switchTab('chat');
                addInlineMessage(`Upload failed: ${file.name}`, 'friend');
                uploadXhr = null;

                // Continue with next file despite error
                if (uploadQueue.length > 0) {
                    setTimeout(processUploadQueue, 500);
                } else {
                    uploadBtn.disabled = false;
                    setTimeout(() => progressEl.classList.remove('active'), 2000);
                }
            };

            uploadXhr.open('POST', '/api/upload');
            uploadXhr.send(formData);
        }

        // ============== SSE ==============

        let eventSource = null;
        let reconnectAttempts = 0;

        function connectSSE() {
            if (eventSource) eventSource.close();

            eventSource = new EventSource('/api/events');

            eventSource.addEventListener('init', (e) => {
                const data = JSON.parse(e.data);
                const allTasks = data.tasks || [];
                // Split tasks into pending and completed
                tasksData = allTasks.filter(t => t.status !== 'completed');
                completedTasksData = allTasks.filter(t => t.status === 'completed')
                    .sort((a, b) => (b.completed_at || '').localeCompare(a.completed_at || ''))
                    .slice(0, 20);
                projectsData = data.projects || [];
                updateTasksBadge();
                if (activeTab === 'focus') {
                    renderTodayTasks();
                    renderProjects();
                    renderCompletedTasks();
                }
                reconnectAttempts = 0;
            });

            eventSource.addEventListener('tasks_update', (e) => {
                const data = JSON.parse(e.data);
                const allTasks = data.tasks || [];
                // Split tasks into pending and completed
                tasksData = allTasks.filter(t => t.status !== 'completed');
                completedTasksData = allTasks.filter(t => t.status === 'completed')
                    .sort((a, b) => (b.completed_at || '').localeCompare(a.completed_at || ''))
                    .slice(0, 20);
                if (activeTab === 'focus') {
                    renderTodayTasks();
                    renderProjects();
                    renderCompletedTasks();
                }
                updateTasksBadge();
            });

            eventSource.addEventListener('projects_update', (e) => {
                const data = JSON.parse(e.data);
                projectsData = data.projects || [];
                if (activeTab === 'focus') {
                    renderProjects();
                }
            });

            eventSource.addEventListener('ping', () => {});

            eventSource.onerror = () => {
                eventSource.close();
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                reconnectAttempts++;
                setTimeout(connectSSE, delay);
            };
        }

        // ============== Drag and Drop ==============

        const appEl = document.querySelector('.app');

        appEl.addEventListener('dragover', (e) => {
            e.preventDefault();
            appEl.classList.add('drag-over');
        });

        appEl.addEventListener('dragleave', (e) => {
            e.preventDefault();
            appEl.classList.remove('drag-over');
        });

        appEl.addEventListener('drop', (e) => {
            e.preventDefault();
            appEl.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) {
                queueUploads(Array.from(e.dataTransfer.files));
            }
        });

        // Initialize
        init();
    </script>
</body>
</html>
