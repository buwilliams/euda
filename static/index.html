<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me and Us</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 640px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Header */
        header {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .logo {
            width: 240px;
            height: auto;
        }

        /* Activity Feed */
        .activity {
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 1rem;
            min-height: 2.5rem;
        }

        .activity-item {
            display: flex;
            align-items: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .activity-item:last-child {
            margin-bottom: 0;
        }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.75rem;
            flex-shrink: 0;
        }

        .activity-dot.working {
            background: #f59e0b;
            animation: pulse 1.5s infinite;
        }

        .activity-dot.done {
            background: #10b981;
        }

        .activity-dot.idle {
            background: #d1d5db;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .activity-quiet {
            color: #999;
            font-style: italic;
        }

        /* Chat Section */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 1rem;
        }

        .message {
            margin-bottom: 1.25rem;
            line-height: 1.7;
        }

        .message-friend {
            padding-left: 1rem;
            border-left: 2px solid #e5e5e5;
        }

        .message-you {
            color: #333;
        }

        .message-content {
            white-space: pre-wrap;
        }

        .message-thinking {
            color: #999;
            font-style: italic;
            display: flex;
            align-items: center;
            padding-left: 1rem;
            border-left: 2px solid #e5e5e5;
        }

        .thinking-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 0.5rem;
        }

        .thinking-dots span {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: thinking 1.4s infinite;
        }

        .thinking-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes thinking {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Chat Input */
        .chat-input-container {
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .chat-input {
            display: flex;
            gap: 0.75rem;
        }

        .chat-input input {
            flex: 1;
            padding: 0.875rem 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #666;
        }

        .chat-input input:disabled {
            background: #fafafa;
            color: #999;
        }

        .chat-input button {
            padding: 0.875rem 1.5rem;
            border: none;
            background: #000;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-input button:hover:not(:disabled) {
            background: #333;
        }

        .chat-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Quick actions - subtle hints, not buttons */
        .hints {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #999;
        }

        .hint {
            display: inline;
            cursor: pointer;
        }

        .hint:hover {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <img src="/static/images/meandus.png" alt="Me and Us" class="logo">
        </header>

        <section class="activity" id="activity">
            <div class="activity-quiet">All quiet. Your attention is free.</div>
        </section>

        <section class="chat">
            <div class="messages" id="messages">
                <div class="message message-friend">
                    <div class="message-content">Hey. I'm here when you need me. What's on your mind?</div>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Talk to me..." autofocus>
                    <button id="send-btn" onclick="sendMessage()">Send</button>
                </div>
                <div class="hints">
                    Try: <span class="hint" onclick="askAbout('what did I log today')">"what did I log today"</span> ·
                    <span class="hint" onclick="askAbout('what are my values')">"what are my values"</span> ·
                    <span class="hint" onclick="askAbout('any discoveries for me')">"any discoveries"</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        // State
        let sessionId = localStorage.getItem('sessionId') || null;
        let isWaiting = false;

        // Elements
        const messagesEl = document.getElementById('messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const activityEl = document.getElementById('activity');

        // Send message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || isWaiting) return;

            addMessage(message, 'you');
            chatInput.value = '';
            setWaiting(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                const data = await response.json();
                sessionId = data.session_id;
                localStorage.setItem('sessionId', sessionId);

                removeThinking();
                addMessage(data.response, 'friend');
            } catch (error) {
                removeThinking();
                addMessage('I had trouble processing that. Could you try again?', 'friend');
            }

            setWaiting(false);
        }

        function setWaiting(waiting) {
            isWaiting = waiting;
            chatInput.disabled = waiting;
            sendBtn.disabled = waiting;

            if (waiting) {
                addThinking();
            }
        }

        function addMessage(content, role) {
            const div = document.createElement('div');
            div.className = `message message-${role}`;
            div.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function addThinking() {
            const div = document.createElement('div');
            div.className = 'message-thinking';
            div.id = 'thinking';
            div.innerHTML = `Thinking<div class="thinking-dots"><span></span><span></span><span></span></div>`;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function removeThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function askAbout(query) {
            chatInput.value = query;
            chatInput.focus();
        }

        // Enter to send
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isWaiting) sendMessage();
        });

        // Activity polling
        let lastAgentStates = {};

        async function pollActivity() {
            try {
                const response = await fetch('/api/agents/status');
                const data = await response.json();

                const activities = [];
                let anyWorking = false;

                for (const agent of data.agents) {
                    const key = agent.name;
                    const prevState = lastAgentStates[key];

                    // Check if agent just completed work
                    if (agent.last_active && prevState?.last_active !== agent.last_active) {
                        if (prevState) {
                            activities.push({
                                text: `${agent.name.split(' ')[0]} finished`,
                                status: 'done'
                            });
                        }
                    }

                    // Check if agent is working (status is 'ready' with recent activity)
                    if (agent.status === 'ready') {
                        const lastActive = new Date(agent.last_active);
                        const now = new Date();
                        const secondsAgo = (now - lastActive) / 1000;

                        if (secondsAgo < 30) {
                            activities.push({
                                text: `${agent.name.split(' ')[0]} working...`,
                                status: 'working'
                            });
                            anyWorking = true;
                        }
                    }

                    lastAgentStates[key] = { ...agent };
                }

                updateActivityFeed(activities);
            } catch (error) {
                // Silent fail - activity feed is non-critical
            }
        }

        function updateActivityFeed(activities) {
            if (activities.length === 0) {
                activityEl.innerHTML = '<div class="activity-quiet">All quiet. Your attention is free.</div>';
            } else {
                let html = '';
                activities.forEach(a => {
                    html += `<div class="activity-item">
                        <span class="activity-dot ${a.status}"></span>
                        ${escapeHtml(a.text)}
                    </div>`;
                });
                activityEl.innerHTML = html;
            }
        }

        // Poll every 3 seconds
        setInterval(pollActivity, 3000);
        pollActivity();

        // Focus input on load
        chatInput.focus();
    </script>
</body>
</html>
