<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euno, Personal Intelligence.</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #2d2d2d;
            color: #000;
            min-height: 100vh;
        }

        /* Main layout with optional panel */
        .app-container {
            display: flex;
            height: 100vh;
            justify-content: center;
            padding: 1rem;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            max-width: 640px;
            padding: 1.5rem;
            background: #f8f8f8;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        /* ============== Context/Quote Content ============== */
        .context-content {
            flex: 0 0 auto;
            overflow-y: auto;
            padding: 0.5rem 0;
            max-height: 40vh;
        }

        .context-content:empty {
            display: none;
        }

        .greeting {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .context-section {
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
            margin-bottom: 0.75rem;
            font-family: 'Roboto', sans-serif;
        }

        .section-content {
            padding-left: 0;
        }

        /* Context items */
        .context-item {
            display: flex;
            align-items: flex-start;
            padding: 0.5rem 0;
            line-height: 1.5;
        }

        .context-item-bullet {
            color: #999;
            margin-right: 0.5rem;
            flex-shrink: 0;
        }

        .context-item-content {
            flex: 1;
        }

        .context-item-meta {
            font-size: 0.85rem;
            color: #666;
            margin-left: 1rem;
        }

        .context-empty {
            color: #999;
            font-style: italic;
            padding: 0.5rem 0;
        }

        /* Action prompts */
        .action-prompt {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 0.5rem;
        }

        .action-prompt-text {
            color: #333;
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        .action-btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #333;
        }

        /* Noticed patterns */
        .noticed-item {
            padding: 0.5rem 0;
            color: #666;
            font-size: 0.95rem;
        }

        /* Active Day View (Minimal) */
        .active-view-minimal {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            color: #666;
        }

        .active-current {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .active-next {
            font-size: 1rem;
            color: #999;
        }

        .active-next a {
            color: #666;
            text-decoration: underline;
            cursor: pointer;
        }

        .surfaced-notice {
            margin-top: 2rem;
            padding: 1rem;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .surfaced-notice-text {
            margin-bottom: 0.75rem;
        }

        .surfaced-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .surfaced-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        .surfaced-btn:hover {
            background: #f5f5f5;
        }

        /* Inline Chat */
        .inline-chat {
            flex: 1;
            padding: 1rem 0;
            overflow-y: auto;
            min-height: 100px;
        }

        .inline-chat-messages {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .inline-message {
            line-height: 1.6;
            max-width: 90%;
            animation: fadeIn 0.3s ease-out;
        }

        .inline-message-you {
            align-self: flex-end;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 0.5rem 0.75rem;
            font-size: 0.95rem;
        }

        .inline-message-friend {
            align-self: flex-start;
        }

        .inline-message-friend .message-content {
            color: #333;
        }

        /* Day Summary (Evening) */
        .summary-item {
            display: flex;
            align-items: center;
            padding: 0.35rem 0;
        }

        .summary-check {
            color: #10b981;
            margin-right: 0.5rem;
        }

        .summary-deferred {
            color: #f59e0b;
            margin-right: 0.5rem;
        }

        /* Open threads */
        .thread-item {
            display: flex;
            align-items: flex-start;
            padding: 0.5rem 0;
        }

        .thread-urgency {
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            margin-right: 0.75rem;
            flex-shrink: 0;
            font-family: 'Roboto', sans-serif;
        }

        .thread-urgency.can-wait {
            background: #f3f4f6;
            color: #6b7280;
        }

        .thread-urgency.soon {
            background: #fef3c7;
            color: #92400e;
        }

        .thread-urgency.do-now {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Tomorrow preview */
        .tomorrow-preview {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 1rem;
        }

        .tomorrow-summary {
            color: #666;
            margin-bottom: 0.5rem;
        }

        .tomorrow-suggestion {
            color: #888;
            font-size: 0.9rem;
        }

        /* ============== Messages (for panels and inline) ============== */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            line-height: 1.6;
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-friend {
            align-self: flex-start;
            background: #f5f5f5;
            border-radius: 18px 18px 18px 4px;
            padding: 0.75rem 1rem;
        }

        .message-you {
            align-self: flex-end;
            background: #000;
            color: #fff;
            border-radius: 18px 18px 4px 18px;
            padding: 0.75rem 1rem;
        }

        .message-content {
            word-wrap: break-word;
            overflow-wrap: break-word;
            overflow: visible;
        }

        .message-thinking {
            color: #999;
            font-style: italic;
            display: flex;
            align-items: center;
            align-self: flex-start;
            background: #f5f5f5;
            border-radius: 18px 18px 18px 4px;
            padding: 0.75rem 1rem;
            animation: fadeIn 0.3s ease-out;
        }

        .message-system {
            align-self: stretch;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 1rem;
            max-width: 100%;
            animation: fadeIn 0.3s ease-out;
        }

        .message-system-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e9ecef;
        }

        .message-system-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
        }

        .message-system-close {
            background: none;
            border: none;
            font-size: 1.25rem;
            color: #999;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .message-system-close:hover {
            color: #333;
        }

        .message-system-body {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #333;
        }

        .message-system-body h2 {
            font-size: 1rem;
            margin: 1rem 0 0.5rem;
            color: #333;
        }

        .message-system-body h2:first-child { margin-top: 0; }

        .message-system-body h3 {
            font-size: 0.95rem;
            margin: 0.75rem 0 0.25rem;
            color: #444;
        }

        .message-system-body p { margin: 0.5rem 0; }
        .message-system-body ul, .message-system-body ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .message-system-body li { margin: 0.25rem 0; }
        .message-system-body hr { border: none; border-top: 1px dashed #ddd; margin: 1rem 0; }

        .thinking-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 0.5rem;
        }

        .thinking-dots span {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: thinking 1.4s infinite;
        }

        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes thinking {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ============== Chat Input (Bottom Bar) ============== */
        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            padding: 0.75rem 0;
            border-top: none;
        }

        .clear-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            color: #666;
            transition: all 0.15s;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .clear-btn:hover {
            background: #eee;
            color: #333;
        }

        .clear-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .input-bar textarea {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            min-height: 40px;
            max-height: 200px;
            line-height: 1.4;
            overflow-y: auto;
            box-sizing: border-box;
            background: #fff;
        }

        .input-bar textarea:focus {
            outline: none;
            border-color: #999;
        }

        .input-bar textarea:disabled {
            background: #fafafa;
            color: #999;
        }

        #context-send-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 6px;
            background: #333;
            color: #fff;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        #context-send-btn:hover:not(:disabled) {
            background: #444;
            color: #fff;
        }

        #context-send-btn:disabled {
            background: #ccc;
            color: #888;
            cursor: not-allowed;
        }

        #context-send-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ============== Tabs Container ============== */
        .tabs-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .tab-content {
            flex: 1;
            overflow: hidden;
            border: 1px solid #e8e8e8;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            background: #f8f8f8;
        }

        .tab-pane {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding: 1rem;
        }

        .tab-pane.active {
            display: block;
        }

        /* Tab Menu */
        .tab-menu {
            display: flex;
            align-items: stretch;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1rem;
            background: #f0f0f0;
            border: none;
            border-right: 1px solid #ddd;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            color: #666;
            transition: all 0.15s;
            position: relative;
        }

        .tab-btn:hover {
            background: #e8e8e8;
            color: #333;
        }

        .tab-btn.active {
            background: #f8f8f8;
            color: #333;
            margin-top: -1px;
            padding-top: calc(0.6rem + 1px);
            border-top: 1px solid #f8f8f8;
        }

        .tab-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tab-btn svg rect {
            fill: none;
        }

        .tab-badge {
            background: #ef4444;
            color: #fff;
            font-size: 0.65rem;
            padding: 0.1rem 0.35rem;
            border-radius: 8px;
            min-width: 1rem;
            text-align: center;
            font-family: 'Roboto', sans-serif;
        }

        .tab-spacer {
            flex: 1;
        }

        .tab-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 0.8rem;
            background: transparent;
            border: none;
            border-left: 1px solid #ddd;
            cursor: pointer;
            color: #666;
            transition: all 0.15s;
        }

        .tab-action-btn:hover {
            background: #e8e8e8;
            color: #333;
        }

        .tab-action-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ============== Focus Tab - Things-like Navigation ============== */
        .focus-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .focus-empty {
            color: #999;
            font-style: italic;
            font-size: 0.9rem;
            padding: 0.5rem 0;
        }

        /* Focus Menu */
        .focus-menu {
            display: flex;
            flex-direction: column;
        }

        .focus-menu-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.15s;
        }

        .focus-menu-item:hover {
            background: #f9f9f9;
        }

        .focus-menu-item:last-child {
            border-bottom: none;
        }

        .focus-menu-icon {
            width: 28px;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .focus-menu-label {
            flex: 1;
            font-size: 0.95rem;
            color: #333;
        }

        .focus-menu-subtitle {
            font-size: 0.75rem;
            color: #999;
            margin-left: 0.5rem;
            font-style: italic;
        }

        .focus-menu-count {
            color: #888;
            font-size: 0.85rem;
            margin-right: 0.5rem;
        }

        .focus-menu-arrow {
            color: #ccc;
            font-size: 0.9rem;
        }

        .focus-menu-divider {
            height: 1px;
            background: #ddd;
            margin: 0.5rem 0;
        }

        /* Focus View Header */
        .focus-view-header {
            display: flex;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
            background: #fafafa;
            margin: -1rem -1rem 0.75rem -1rem;
        }

        .focus-back-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            margin-right: 0.25rem;
            color: #666;
        }

        .focus-back-btn:hover {
            color: #333;
        }

        .focus-view-title {
            font-weight: 600;
            font-size: 1rem;
            color: #333;
        }

        /* Focus View Content */
        .focus-view-content {
            flex: 1;
            overflow-y: auto;
        }

        /* When Picker */
        .when-picker {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .when-picker-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
        }

        .when-picker-content {
            position: relative;
            background: #fff;
            border-radius: 12px 12px 0 0;
            padding: 1rem;
            width: 100%;
            max-width: 640px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
        }

        .when-picker-header {
            font-weight: 600;
            font-size: 0.9rem;
            color: #666;
            text-align: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eee;
        }

        .when-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .when-option:hover {
            background: #f5f5f5;
        }

        .when-option-icon {
            font-size: 1.1rem;
            width: 28px;
            text-align: center;
        }

        .when-option-label {
            font-size: 0.95rem;
            color: #333;
        }

        /* Date Picker in When Picker */
        .when-date-input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .when-date-input:focus {
            outline: none;
            border-color: #999;
        }

        /* Card When Button */
        .card-when {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.6rem;
            background: #f5f5f5;
            border: 1px solid #eee;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 0.5rem;
            transition: all 0.15s;
        }

        .card-when:hover {
            background: #eee;
            border-color: #ddd;
        }

        .card-when-icon {
            font-size: 0.9rem;
        }

        .card-when-label {
            font-size: 0.8rem;
            color: #666;
        }

        /* Euno task icon */
        .card-euno-icon {
            font-size: 0.85rem;
            margin-right: 0.35rem;
            flex-shrink: 0;
        }

        /* Inline archive input */
        .card-archive-form {
            display: flex;
            gap: 0.35rem;
            padding: 0.5rem 0.75rem;
            border-top: 1px solid #eee;
            background: #f9f9f9;
        }

        .card-archive-input {
            flex: 1;
            padding: 0.35rem 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.8rem;
        }

        .card-archive-input:focus {
            outline: none;
            border-color: #999;
        }

        .card-archive-btn {
            padding: 0.35rem 0.6rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            color: #666;
        }

        .card-archive-btn:hover {
            border-color: #999;
            color: #333;
        }

        .card-archive-btn.confirm {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        .card-archive-btn.confirm:hover {
            background: #333;
        }

        /* ============== Chat Tab ============== */
        .chat-content {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-content .context-content {
            flex: 0 0 auto;
        }

        .chat-content .inline-chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* ============== History Tab ============== */
        .history-content {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* ============== About Tab ============== */
        .about-content {
            padding: 1rem;
            line-height: 1.6;
            color: #333;
        }

        .about-content h1 {
            font-size: 1.5rem;
            margin: 0 0 1rem 0;
            color: #222;
        }

        .about-content h2 {
            font-size: 1.25rem;
            margin: 1.5rem 0 0.75rem 0;
            color: #333;
        }

        .about-content h3 {
            font-size: 1.1rem;
            margin: 1.25rem 0 0.5rem 0;
            color: #444;
        }

        .about-content p {
            margin: 0.5rem 0;
        }

        .about-content ul, .about-content ol {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }

        .about-content li {
            margin: 0.25rem 0;
        }

        .about-content strong {
            color: #222;
        }

        .about-content blockquote {
            margin: 1rem 0;
            padding: 0.5rem 1rem;
            border-left: 3px solid #ddd;
            background: #f9f9f9;
            color: #555;
        }

        .about-content code {
            background: #f5f5f5;
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            font-size: 0.9em;
        }

                                <div class="loading-spinner">Loading...</div>
                            </div>
                            <div class="inline-chat-messages" id="inline-messages"></div>
                        </div>
                    </div>

                    <!-- Focus Tab -->
                    <div class="tab-pane" id="tab-focus">
                        <div class="focus-content" id="focus-content">
                            <!-- Content dynamically rendered by renderFocusTab() -->
                        </div>
                    </div>

                    <!-- History Tab -->
                    <div class="tab-pane" id="tab-history">
                        <div class="history-content" id="history-list">
                            <div class="focus-empty">Loading...</div>
                        </div>
                    </div>

                    <!-- About Tab -->
                    <div class="tab-pane" id="tab-about">
                        <div class="about-content" id="about-content">
                            <div class="focus-empty">Loading...</div>
                        </div>
                    </div>
                </div>

                <!-- Tab Menu (below content) -->
                <div class="tab-menu">
                    <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span>Chat</span>
                    </button>
                    <button class="tab-btn" data-tab="focus" onclick="switchTab('focus')">
                        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="4" height="4" rx="1"/><line x1="10" y1="7" x2="21" y2="7"/><rect x="3" y="15" width="4" height="4" rx="1"/><line x1="10" y1="17" x2="21" y2="17"/></svg>
                        <span>Focus</span>
                        <span class="tab-badge" id="tasks-badge" style="display: none;">0</span>
                    </button>
                    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="12 6 12 12 16 14" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        <span>History</span>
                    </button>
                    <button class="tab-btn" data-tab="about" onclick="switchTab('about')">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="16" x2="12" y2="12" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg>
                        <span>About</span>
                    </button>
                    <div class="tab-spacer"></div>
                    <button class="tab-action-btn" id="upload-btn" onclick="triggerUpload()" title="Upload file">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </button>
                    <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(event)" multiple>
                </div>
            </div>

            <!-- Input Bar (always visible) -->
            <div class="input-bar">
                <textarea id="context-input" placeholder="What's on your mind?" rows="1"></textarea>
                <button id="context-send-btn" onclick="sendContextMessage()" title="Send">
                    <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
                <button class="clear-btn" onclick="resetUI()" title="Clear chat">
                    <svg viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Upload Progress -->
        <div class="upload-progress" id="upload-progress">
            <div class="upload-progress-header">
                <span class="upload-progress-filename" id="upload-filename">filename.pdf</span>
                <span class="upload-progress-percent" id="upload-percent">0%</span>
            </div>
            <div class="upload-progress-bar">
                <div class="upload-progress-fill" id="upload-fill"></div>
            </div>
            <div class="upload-progress-status" id="upload-status">Uploading...</div>
        </div>
    </div>

    <script>
        // Configure marked
        marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

        // State
        let sessionId = localStorage.getItem('sessionId') || null;
        let viewingHistorySessionId = null;  // Track which history conversation is being viewed
        let isWaiting = false;
        let activeTab = localStorage.getItem('activeTab') || 'chat';
        let expandedCards = new Set();  // Track which cards are expanded
        let tasksData = [];
        let projectsData = [];
        let projectNotesData = {};
        let historyData = [];
        let uploadXhr = null;

        // Focus tab navigation state
        let focusView = 'menu';  // 'menu' | 'today' | 'upcoming' | 'anytime' | 'someday' | 'logbook' | 'projects' | 'project-{id}'
        let focusViewHistory = [];  // For back navigation
        let expandedProjectGroups = new Set();  // Track which project groups are expanded (collapsed by default)
        let archivingTaskId = null;  // Track which task is showing archive input

        // Elements
        const appContainer = document.getElementById('app-container');
        const contextContent = document.getElementById('context-content');

        // Initialize
        async function init() {
            // Restore active tab
            switchTab(activeTab, false);

            // Load daily quote
            loadDailyQuote();

            // Connect SSE
            connectSSE();

            // Load tasks data for badge
            loadTasksData();
        }

        // ============== Tab Functions ==============

        function switchTab(tabName, saveState = true) {
            // Hide all panes and deactivate all buttons
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            // Show selected pane and activate button
            const pane = document.getElementById(`tab-${tabName}`);
            const btn = document.querySelector(`[data-tab="${tabName}"]`);
            if (pane) pane.classList.add('active');
            if (btn) btn.classList.add('active');

            activeTab = tabName;
            if (saveState) {
                localStorage.setItem('activeTab', tabName);
            }

            // Load data for tab
            if (tabName === 'focus') loadTasksData();
            if (tabName === 'history') loadHistoryData();
            if (tabName === 'about') loadAboutData();
        }

        // ============== Daily Quote ==============

        async function loadDailyQuote() {
            // Show loading state
            contextContent.innerHTML = `
                <div class="quote-container">
                    <div class="quote-loading">Loading today's reflection...</div>
                </div>
            `;

            try {
                const response = await fetch('/api/daily-quote');
                const data = await response.json();
                renderQuote(data);
            } catch (error) {
                console.error('Failed to load daily quote:', error);
                // Fallback
                renderQuote({
                    quote: "The only way to do great work is to love what you do.",
                    author: "Steve Jobs"
                });
            }
        }

        function renderQuote(data) {
            contextContent.innerHTML = `
                <div class="quote-container">
                    <div class="quote-text">"${escapeHtml(data.quote)}"</div>
                    <div class="quote-author">— ${escapeHtml(data.author)}</div>
                </div>
            `;
        }

        // ============== Inline Chat ==============

        const contextInput = document.getElementById('context-input');
        const contextSendBtn = document.getElementById('context-send-btn');
        const inlineMessages = document.getElementById('inline-messages');

        async function sendContextMessage() {
            const message = contextInput.value.trim();
            if (!message || isWaiting) return;

            // Switch to chat tab if not already there
            if (activeTab !== 'chat') {
                switchTab('chat');
            }

            // Add user message
            addInlineMessage(message, 'you');
            contextInput.value = '';
            contextInput.style.height = 'auto';
            setContextWaiting(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                const data = await response.json();

                if (!response.ok) {
                    removeInlineThinking();
                    addInlineMessage(`Something went wrong: ${data.detail || 'Unknown error'}`, 'friend');
                    setContextWaiting(false);
                    return;
                }

                sessionId = data.session_id;
                localStorage.setItem('sessionId', sessionId);

                removeInlineThinking();
                addInlineMessage(data.response, 'friend');

                // If the agent cleared the conversation, clear the UI after showing the response
                if (data.clear_chat) {
                    setTimeout(() => {
                        inlineMessages.innerHTML = '';
                        loadDailyQuote();
                    }, 1500);  // Brief delay so user sees the confirmation
                }
            } catch (error) {
                console.error('Chat error:', error);
                removeInlineThinking();
                addInlineMessage('I had trouble processing that. Could you try again?', 'friend');
            }

            setContextWaiting(false);
            contextInput.focus();
        }

        function addInlineMessage(content, role) {
            const div = document.createElement('div');
            div.className = `inline-message inline-message-${role}`;
            const html = role === 'friend' ? marked.parse(content) : escapeHtml(content);
            div.innerHTML = `<div class="message-content">${html}</div>`;
            inlineMessages.appendChild(div);
            // Scroll to bottom of chat tab
            const chatPane = document.getElementById('tab-chat');
            if (chatPane) chatPane.scrollTop = chatPane.scrollHeight;
        }

        function addInlineThinking() {
            const div = document.createElement('div');
            div.className = 'inline-message inline-message-friend';
            div.id = 'inline-thinking';
            div.innerHTML = `<div class="message-content" style="color: #999; font-style: italic;">Thinking<span class="thinking-dots"><span></span><span></span><span></span></span></div>`;
            inlineMessages.appendChild(div);
            const chatPane = document.getElementById('tab-chat');
            if (chatPane) chatPane.scrollTop = chatPane.scrollHeight;
        }

        function removeInlineThinking() {
            const el = document.getElementById('inline-thinking');
            if (el) el.remove();
        }

        function setContextWaiting(waiting) {
            isWaiting = waiting;
            contextInput.disabled = waiting;
            contextSendBtn.disabled = waiting;
            if (waiting) addInlineThinking();
        }

        // Auto-expand context textarea
        contextInput.addEventListener('input', () => {
            contextInput.style.height = 'auto';
            contextInput.style.height = Math.min(contextInput.scrollHeight, 200) + 'px';
        });

        // Enter to send in context input
        contextInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !isWaiting) {
                e.preventDefault();
                sendContextMessage();
            }
        });

        // ============== Chat Overlay (Legacy) ==============

        function openChat() {
            // Now just focus the inline input
            contextInput.focus();
        }

        function openChatWith(message) {
            contextInput.value = message;
            contextInput.focus();
        }

        function sendPrompt(message) {
            contextInput.value = message;
            sendContextMessage();
        }

        function closeChat() {
            // No-op now
        }

        async function resetUI() {
            // Clear all messages
            inlineMessages.innerHTML = '';
            // Switch to chat tab
            switchTab('chat');
            // Reload the quote
            loadDailyQuote();
            // Clear expanded cards state
            expandedCards.clear();

            // Create a new session (old session preserved in history)
            try {
                const response = await fetch('/api/sessions/new', { method: 'POST' });
                if (response.ok) {
                    const data = await response.json();
                    sessionId = data.session_id;
                    localStorage.setItem('sessionId', sessionId);
                }
            } catch (error) {
                console.error('Failed to create new session:', error);
            }
        }

        // ============== Utility Functions ==============

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============== Tasks ==============

        let completedTasksData = [];

        async function loadTasksData() {
            try {
                const [tasksRes, projectsRes, completedRes] = await Promise.all([
                    fetch('/api/tasks'),
                    fetch('/api/projects'),
                    fetch('/api/tasks/completed?days=30&limit=20')
                ]);

                const tasksJson = await tasksRes.json();
                const projectsJson = await projectsRes.json();
                const completedJson = await completedRes.json();

                // Filter out archived and completed tasks from main list
                const allTasks = tasksJson.tasks || [];
                tasksData = allTasks.filter(t => t.status !== 'completed' && t.status !== 'archived');
                projectsData = projectsJson.projects || [];
                completedTasksData = completedJson.tasks || [];

                // Load notes for each active project (full list for inline display)
                const activeProjects = projectsData.filter(p => p.status === 'active');
                const notesPromises = activeProjects.map(async (p) => {
                    try {
                        const res = await fetch(`/api/projects/${p.id}/notes/list`);
                        const data = await res.json();
                        projectNotesData[p.id] = {
                            count: data.count || 0,
                            notes: data.notes || []
                        };
                    } catch (e) {
                        projectNotesData[p.id] = { count: 0, notes: [] };
                    }
                });
                await Promise.all(notesPromises);

                renderFocusTab();
                updateTasksBadge();
            } catch (error) {
                console.error('Failed to load tasks data:', error);
            }
        }

        // ============== Focus Tab - Things-like Navigation ==============

        // System project IDs that should be filtered from timeline views
        const SYSTEM_PROJECT_IDS = ['project-notifications', 'project-recommendations'];

        function isSystemProjectTask(task) {
            return SYSTEM_PROJECT_IDS.includes(task.project_id);
        }

        function shouldShowInTimeline(task) {
            // Non-system project tasks always show in timeline
            if (!isSystemProjectTask(task)) return true;
            // System project tasks only show if user explicitly set a When value
            const dueDate = task.scheduling?.due_date;
            const someday = task.scheduling?.someday;
            return dueDate || someday;
        }

        function getTaskCategory(task) {
            const today = new Date().toISOString().split('T')[0];
            const dueDate = task.scheduling?.due_date;
            const someday = task.scheduling?.someday;

            if (task.status === 'completed') return 'logbook';
            if (dueDate === today) return 'today';
            if (dueDate && dueDate > today) return 'upcoming';
            if (!dueDate && someday) return 'someday';
            return 'anytime';
        }

        function getFocusCounts() {
            const today = new Date().toISOString().split('T')[0];
            const counts = { today: 0, upcoming: 0, anytime: 0, someday: 0, logbook: 0, projects: 0 };

            // Only count tasks that should show in timeline
            tasksData.filter(shouldShowInTimeline).forEach(task => {
                const category = getTaskCategory(task);
                if (category === 'logbook') return; // Don't count in logbook badge
                counts[category]++;
            });

            counts.logbook = completedTasksData.filter(shouldShowInTimeline).length;
            counts.projects = projectsData.filter(p => p.status === 'active').length;

            return counts;
        }

        function renderFocusTab() {
            const container = document.getElementById('focus-content');
            if (!container) return;

            if (focusView === 'menu') {
                container.innerHTML = renderFocusMenu();
            } else if (focusView === 'today') {
                container.innerHTML = renderTimelineView('today', 'Today');
            } else if (focusView === 'upcoming') {
                container.innerHTML = renderTimelineView('upcoming', 'Upcoming');
            } else if (focusView === 'anytime') {
                container.innerHTML = renderTimelineView('anytime', 'Anytime');
            } else if (focusView === 'someday') {
                container.innerHTML = renderTimelineView('someday', 'Someday');
            } else if (focusView === 'logbook') {
                container.innerHTML = renderLogbookView();
            } else if (focusView.startsWith('project-')) {
                const projectId = focusView;
                container.innerHTML = renderSingleProjectView(projectId);
            }
        }

        function renderFocusMenu() {
            const counts = getFocusCounts();
            const activeProjects = projectsData.filter(p => p.status === 'active');

            // Get task counts per project
            const projectTaskCounts = {};
            activeProjects.forEach(p => {
                projectTaskCounts[p.id] = tasksData.filter(t => t.project_id === p.id && t.status !== 'completed').length;
            });

            return `
                <div class="focus-menu">
                    <div class="focus-menu-item" onclick="navigateFocus('today')">
                        <span class="focus-menu-icon">☀️</span>
                        <span class="focus-menu-label">Today</span>
                        <span class="focus-menu-count">${counts.today}</span>
                        <span class="focus-menu-arrow">›</span>
                    </div>
                    <div class="focus-menu-item" onclick="navigateFocus('upcoming')">
                        <span class="focus-menu-icon">📅</span>
                        <span class="focus-menu-label">Upcoming</span>
                        <span class="focus-menu-count">${counts.upcoming}</span>
                        <span class="focus-menu-arrow">›</span>
                    </div>
                    <div class="focus-menu-item" onclick="navigateFocus('anytime')">
                        <span class="focus-menu-icon">⏳</span>
                        <span class="focus-menu-label">Anytime</span>
                        <span class="focus-menu-count">${counts.anytime}</span>
                        <span class="focus-menu-arrow">›</span>
                    </div>
                    <div class="focus-menu-item" onclick="navigateFocus('someday')">
                        <span class="focus-menu-icon">💭</span>
                        <span class="focus-menu-label">Someday</span>
                        <span class="focus-menu-count">${counts.someday}</span>
                        <span class="focus-menu-arrow">›</span>
                    </div>
                    <div class="focus-menu-item" onclick="navigateFocus('logbook')">
                        <span class="focus-menu-icon">📖</span>
                        <span class="focus-menu-label">Logbook</span>
                        <span class="focus-menu-count">${counts.logbook}</span>
                        <span class="focus-menu-arrow">›</span>
                    </div>
                    ${activeProjects.map(project => {
                        const isSystemProject = project.id === 'project-notifications' || project.id === 'project-recommendations';
                        const icon = isSystemProject ? '✨' : '📁';
                        const subtitle = isSystemProject ? '<span class="focus-menu-subtitle">from Euno</span>' : '';
                        return `
                        <div class="focus-menu-item" onclick="navigateFocus('${project.id}')">
                            <span class="focus-menu-icon">${icon}</span>
                            <span class="focus-menu-label">${escapeHtml(project.title)}${subtitle}</span>
                            <span class="focus-menu-count">${projectTaskCounts[project.id] || 0}</span>
                            <span class="focus-menu-arrow">›</span>
                        </div>
                    `}).join('')}
                </div>
            `;
        }

        function renderTimelineView(category, title) {
            // Filter to tasks in this category AND should show in timeline
            const tasks = tasksData.filter(t => shouldShowInTimeline(t) && getTaskCategory(t) === category);
            return `
                <div class="focus-view-header">
                    <button class="focus-back-btn" onclick="navigateFocusBack()">←</button>
                    <span class="focus-view-title">${title}</span>
                </div>
                <div class="focus-view-content">
                    ${tasks.length === 0
                        ? '<div class="focus-empty">No tasks</div>'
                        : renderTasksGroupedByProject(tasks)
                    }
                </div>
            `;
        }

        function renderLogbookView() {
            // Filter completed tasks - only show non-system tasks or system tasks with When value
            const tasks = completedTasksData.filter(shouldShowInTimeline).slice(0, 20);
            return `
                <div class="focus-view-header">
                    <button class="focus-back-btn" onclick="navigateFocusBack()">←</button>
                    <span class="focus-view-title">Logbook</span>
                </div>
                <div class="focus-view-content">
                    ${tasks.length === 0
                        ? '<div class="focus-empty">No completed tasks</div>'
                        : renderTasksGroupedByProject(tasks, true)
                    }
                </div>
            `;
        }


        function renderSingleProjectView(projectId) {
            const project = projectsData.find(p => p.id === projectId);
            if (!project) {
                return `
                    <div class="focus-view-header">
                        <button class="focus-back-btn" onclick="navigateFocusBack()">←</button>
                        <span class="focus-view-title">Project not found</span>
                    </div>
                `;
            }

            const projectTasks = tasksData.filter(t => t.project_id === projectId && t.status !== 'completed');
            const noteCount = projectNotesData[projectId]?.count || 0;

            return `
                <div class="focus-view-header">
                    <button class="focus-back-btn" onclick="navigateFocusBack()">←</button>
                    <span class="focus-view-title">${escapeHtml(project.title)}</span>
                </div>
                <div class="focus-view-content">
                    <div class="card-meta" style="margin-bottom: 0.75rem;">${projectTasks.length} pending task${projectTasks.length !== 1 ? 's' : ''} • ${noteCount} note${noteCount !== 1 ? 's' : ''}</div>
                    ${projectTasks.length === 0
                        ? '<div class="focus-empty">No pending tasks</div>'
                        : projectTasks.map(task => renderTaskCard(task)).join('')
                    }
                    <div class="card-add-task" style="margin-top: 0.75rem;">
                        <input type="text" class="card-add-input" id="add-task-${project.id}" placeholder="Add task..." onkeypress="if(event.key==='Enter')addTaskToProject('${project.id}', this)">
                        <button class="card-add-btn" onclick="addTaskToProject('${project.id}', document.getElementById('add-task-${project.id}'))">+</button>
                    </div>
                    ${noteCount > 0 ? `
                    <div style="margin-top: 0.75rem;">
                        <button class="card-action" onclick="toggleProjectNotes('${project.id}')">View ${noteCount} note${noteCount !== 1 ? 's' : ''}</button>
                    </div>
                    ` : ''}
                </div>
            `;
        }

        function renderTasksGroupedByProject(tasks, isCompleted = false) {
            const tasksByProject = {};
            tasks.forEach(task => {
                const projectName = task.project_title || 'General';
                if (!tasksByProject[projectName]) {
                    tasksByProject[projectName] = [];
                }
                tasksByProject[projectName].push(task);
            });

            const sortedProjects = Object.keys(tasksByProject).sort((a, b) => {
                if (a === 'Notifications') return -1;
                if (b === 'Notifications') return 1;
                if (a === 'General') return 1;
                if (b === 'General') return -1;
                return a.localeCompare(b);
            });

            return sortedProjects.map(projectName => {
                const projectTasks = tasksByProject[projectName];
                const groupKey = `${focusView}-${projectName}`;
                const isExpanded = expandedProjectGroups.has(groupKey);
                return `
                    <div class="project-group${isExpanded ? '' : ' collapsed'}" data-group-key="${escapeHtml(groupKey)}">
                        <div class="project-label" onclick="toggleProjectGroup('${escapeHtml(groupKey)}')">
                            <span class="project-label-toggle">▼</span>
                            <span class="project-label-name">${escapeHtml(projectName)}</span>
                            <span class="project-label-count">${projectTasks.length}</span>
                        </div>
                        <div class="project-group-tasks">
                            ${projectTasks.map(task => isCompleted ? renderCompletedTaskCard(task) : renderTaskCard(task)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleProjectGroup(groupKey) {
            if (expandedProjectGroups.has(groupKey)) {
                expandedProjectGroups.delete(groupKey);
            } else {
                expandedProjectGroups.add(groupKey);
            }
            renderFocusTab();
        }

        function navigateFocus(view) {
            focusViewHistory.push(focusView);
            focusView = view;
            renderFocusTab();
        }

        function navigateFocusBack() {
            if (focusViewHistory.length > 0) {
                focusView = focusViewHistory.pop();
            } else {
                focusView = 'menu';
            }
            renderFocusTab();
        }

        // ============== Task Cards ==============

        function renderTaskCard(task) {
            const isExpanded = expandedCards.has(`task-${task.id}`);
            return isExpanded ? renderFullTaskCard(task) : renderMinimalTaskCard(task);
        }

        function isEunoTask(task) {
            // Show icon for all system project tasks (notifications, recommendations, legacy euno)
            return SYSTEM_PROJECT_IDS.includes(task.project_id);
        }

        function renderMinimalTaskCard(task) {
            const eunoIcon = isEunoTask(task) ? '<span class="card-euno-icon">✨</span>' : '';
            const displayName = task.name || task.description || 'Untitled';
            return `
                <div class="card card-minimal" data-task-id="${task.id}">
                    ${eunoIcon}<span class="card-title" onclick="toggleTaskCard('${task.id}')">${escapeHtml(displayName)}</span>
                </div>
            `;
        }

        function renderFullTaskCard(task) {
            const projectName = task.project_title || 'General';
            const whenLabel = getWhenLabel(task);
            const eunoIcon = isEunoTask(task) ? '<span class="card-euno-icon">✨</span>' : '';
            const isArchiving = archivingTaskId === task.id;
            const displayName = task.name || task.description || 'Untitled';
            const hasDescription = task.description && task.description !== task.name;

            return `
                <div class="card card-full" data-task-id="${task.id}">
                    <div class="card-header">
                        ${eunoIcon}<span class="card-title" onclick="toggleTaskCard('${task.id}')">${escapeHtml(displayName)}</span>
                        <button class="card-collapse" onclick="event.stopPropagation(); toggleTaskCard('${task.id}')">−</button>
                    </div>
                    <div class="card-body">

        function getWhenLabel(task) {
            const today = new Date().toISOString().split('T')[0];

            if (dueDate === today) return 'Today';
            if (dueDate) return dueDate;
            if (someday) return 'Someday';

        // ============== Project Cards ==============

        function renderProjectCard(project) {
            const isExpanded = expandedCards.has(`project-${project.id}`);
            return isExpanded ? renderFullProjectCard(project) : renderMinimalProjectCard(project);

        function renderMinimalProjectCard(project) {
            const projectTasks = tasksData.filter(t => t.project_id === project.id && t.status !== 'completed');

                <div class="card card-minimal" data-project-id="${project.id}">

        function renderFullProjectCard(project) {
            const projectTasks = tasksData.filter(t => t.project_id === project.id && t.status !== 'completed');

            const notes = projectNotesData[project.id]?.notes || [];
            const isGeneral = project.id === 'project-general';
            const isNotifications = project.id === 'project-notifications';
            const isRecommendations = project.id === 'project-recommendations';
            const isSystemProject = isGeneral || isNotifications || isRecommendations;
            const whenLabel = getProjectWhenLabel(project);

            return `
                <div class="card card-full" data-project-id="${project.id}">
                    <div class="card-header">
                        <span class="card-title" onclick="toggleProjectCard('${project.id}')">${escapeHtml(project.title)}</span>
                        <button class="card-collapse" onclick="event.stopPropagation(); toggleProjectCard('${project.id}')">−</button>

                    <div class="card-body">
                        ${hasDescription ? `<div class="card-description">${escapeHtml(project.description)}</div>` : ''}
                        ${!isSystemProject ? `
                        <div class="card-when" onclick="event.stopPropagation(); openWhenPicker('project', '${project.id}')">

                            <span class="card-when-label">${escapeHtml(whenLabel)}</span>

                            <div class="notes-section-header">Notes (${noteCount})</div>

                    <div class="card-actions">

                    </div>

        function renderNoteCard(projectId, projectTitle, note) {
            const isExpanded = expandedCards.has(`note-${note.filename}`);

                return `
                    <div class="note-card" data-note-filename="${note.filename}">

                                <span class="note-card-type">${escapeHtml(note.type)}</span>
                                <button class="note-action-btn" onclick="event.stopPropagation(); bringNoteToChat('${escapeHtml(projectTitle).replace(/'/g, "\\'")}', '${escapeHtml(note.title).replace(/'/g, "\\'")}', '${escapeHtml(note.preview).replace(/'/g, "\\'")}')">Chat</button>

                        <div class="note-card-minimal">

                            <span class="note-card-date">${escapeHtml(note.date)}</span>

                    </div>

        function toggleNoteCard(filename) {
            const key = `note-${filename}`;
            if (expandedCards.has(key)) {
                expandedCards.delete(key);
            } else {
                expandedCards.add(key);
            }
            renderFocusTab();
        }

        function getProjectWhenLabel(project) {
            const today = new Date().toISOString().split('T')[0];
            const deadline = project.deadline;
            const someday = project.someday;

            if (deadline === today) return 'Today';
            if (deadline) return deadline;
            if (someday) return 'Someday';
            return 'Anytime';
        }

        function toggleProjectCard(projectId) {
            const key = `project-${projectId}`;
            if (expandedCards.has(key)) {
                expandedCards.delete(key);
            } else {
                expandedCards.add(key);
            }
            renderFocusTab();

            expandedCards.add(`project-${projectId}`);
            renderFocusTab();

        // ============== When Picker ==============

        function openWhenPicker(type, id) {
            const picker = document.createElement('div');
            picker.className = 'when-picker';
            picker.id = 'when-picker';
            picker.innerHTML = `
                <div class="when-picker-backdrop" onclick="closeWhenPicker()"></div>
                <div class="when-picker-content">
                    <div class="when-picker-header">When?</div>
                    <div class="when-option" onclick="setWhen('${type}', '${id}', 'today')">
                        <span class="when-option-icon">☀️</span>
                        <span class="when-option-label">Today</span>
                    </div>
                    <div class="when-option" onclick="showDatePicker('${type}', '${id}')">
                        <span class="when-option-icon">📅</span>
                        <span class="when-option-label">Pick a date...</span>
                    </div>
                    <div id="date-picker-row" style="display: none; padding: 0.5rem 0.75rem;">
                        <input type="date" class="when-date-input" id="when-date-input" onchange="setWhenDate('${type}', '${id}')">
                    </div>
                    <div class="when-option" onclick="setWhen('${type}', '${id}', 'someday')">
                        <span class="when-option-icon">💭</span>
                        <span class="when-option-label">Someday</span>
                    </div>
                    <div class="when-option" onclick="setWhen('${type}', '${id}', 'clear')">
                        <span class="when-option-icon">✕</span>
                        <span class="when-option-label">Clear (Anytime)</span>
                    </div>
                </div>

        function closeWhenPicker() {
            const picker = document.getElementById('when-picker');
            if (picker) {
                picker.remove();
            }
        }

        function showDatePicker(type, id) {
            const row = document.getElementById('date-picker-row');
            const input = document.getElementById('when-date-input');
            if (row && input) {
                row.style.display = 'block';
                input.focus();
            }
        }

        function setWhenDate(type, id) {
            const input = document.getElementById('when-date-input');
            if (input && input.value) {
                setWhen(type, id, 'date', input.value);
            }
        }

        async function setWhen(type, id, whenType, date = null) {
            const endpoint = type === 'task'
                ? `/api/tasks/${id}/when`
                : `/api/projects/${id}/when`;

            try {
                const response = await fetch(endpoint, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ when_type: whenType, date })
                });

                if (response.ok) {
                    closeWhenPicker();
                    await loadTasksData();
                } else {
                    console.error('Failed to update when:', await response.text());
                }
            } catch (error) {
                console.error('Failed to update when:', error);
            }
        }

        async function deleteProject(projectId) {
            if (!confirm('Delete this project and all its tasks?')) return;

            try {
                const response = await fetch(`/api/projects/${projectId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to delete project:', error);
            }
        }

        async function toggleProjectNotes(projectId) {
            // Find the project name
            const project = projectsData.find(p => p.id === projectId);
            const projectName = project ? project.title : 'Project';

            try {
                // Use the new structured notes list endpoint
                const response = await fetch(`/api/projects/${projectId}/notes/list`);
                const data = await response.json();

                // Show notes as list in chat area
                showProjectNotesList(projectId, projectName, data.notes);

                // Update cached count
                projectNotesData[projectId] = { count: data.count };
            } catch (error) {
                console.error('Failed to load notes:', error);
                showProjectNotesList(projectId, projectName, []);
            }
        }

        function showArchiveInput(event, taskId) {
            event.stopPropagation();
            // Toggle archive mode - if already archiving this task, cancel
            if (archivingTaskId === taskId) {
                archivingTaskId = null;
            } else {
                archivingTaskId = taskId;
            }
            renderFocusTab();
            // Focus the input after render
            setTimeout(() => {
                const input = document.getElementById(`archive-reason-${taskId}`);
                if (input) input.focus();
            }, 50);
        }

        async function confirmArchiveTask(taskId) {
            const input = document.getElementById(`archive-reason-${taskId}`);
            const reason = input ? input.value : '';

            try {
                const response = await fetch(`/api/tasks/${taskId}/archive`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason, outcome: 'abandoned' })
                });

                if (response.ok) {
                    archivingTaskId = null;
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to archive task:', error);
            }
        }

        async function archiveProject(projectId) {
            const reason = prompt('Reason for archiving (optional):');
            if (reason === null) return; // Cancelled

            const outcome = confirm('Was this project completed?') ? 'completed' : 'abandoned';

            try {
                const response = await fetch(`/api/projects/${projectId}/archive`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason, outcome })
                });

                if (response.ok) {
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to archive project:', error);
            }
        }

        async function completeProject(projectId) {
            try {
                const response = await fetch(`/api/projects/${projectId}/complete`, {
                    method: 'POST'
                });

                if (response.ok) {
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to complete project:', error);
            }
        }

        async function toggleTask(event, taskId) {
            event.stopPropagation();
            const task = tasksData.find(t => t.id === taskId) || completedTasksData.find(t => t.id === taskId);
            if (!task) return;

            const newStatus = task.status === 'completed' ? 'pending' : 'completed';

            try {
                const response = await fetch(`/api/tasks/${taskId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    // Reload data to reflect changes
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to update task status:', error);
            }
        }

        async function deleteTask(event, taskId) {
            event.stopPropagation();
            if (!confirm('Delete this task?')) return;

            try {
                const response = await fetch(`/api/tasks/${taskId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    await loadTasksData();
                }
            } catch (error) {
                console.error('Failed to delete task:', error);
            }
        }

        function renderCompletedTaskCard(task) {
            const isExpanded = expandedCards.has(`completed-${task.id}`);
            const displayName = task.name || task.description || 'Untitled';
            const hasDescription = task.description && task.description !== task.name;

            if (isExpanded) {
                return `
                    <div class="card card-full" data-task-id="${task.id}" style="opacity: 0.7;">
                        <div class="card-header">
                            <span class="card-title" style="text-decoration: line-through;" onclick="toggleCompletedTaskCard('${task.id}')">${escapeHtml(displayName)}</span>
                            <button class="card-collapse" onclick="event.stopPropagation(); toggleCompletedTaskCard('${task.id}')">−</button>
                        </div>
                        <div class="card-body">
                            ${hasDescription ? `<div class="card-description" style="text-decoration: line-through;">${escapeHtml(task.description)}</div>` : ''}
                            <div class="card-meta">Completed ${task.completed_at ? new Date(task.completed_at).toLocaleDateString() : 'recently'}</div>
                        </div>
                        <div class="card-actions">
                            <button class="card-action" onclick="toggleTask(event, '${task.id}')">Restore</button>
                            <button class="card-action danger" onclick="deleteTask(event, '${task.id}')">Delete</button>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="card card-minimal" data-task-id="${task.id}" style="opacity: 0.7;">
                        <span class="card-title" style="text-decoration: line-through; color: #888;" onclick="toggleCompletedTaskCard('${task.id}')">${escapeHtml(displayName)}</span>
                    </div>
                `;
            }
        }

        function toggleCompletedTaskCard(taskId) {
            const key = `completed-${taskId}`;
            if (expandedCards.has(key)) {
                expandedCards.delete(key);
            } else {
                expandedCards.add(key);
            }
            renderFocusTab();
        }

        // ============== History ==============

        async function loadHistoryData() {
            try {
                const response = await fetch('/api/conversations/recent/structured?count=20');
                const data = await response.json();
                historyData = data.conversations || [];
                renderHistory();
            } catch (error) {
                console.error('Failed to load history:', error);
                document.getElementById('history-list').innerHTML =
                    '<div class="history-empty">Failed to load history</div>';
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if (!historyData || historyData.length === 0) {
                container.innerHTML = '<div class="focus-empty">No conversations yet</div>';
                return;
            }
            container.innerHTML = historyData.map(item => renderHistoryCard(item)).join('');
        }

        function renderHistoryCard(item) {
            const isExpanded = expandedCards.has(`history-${item.session_id}`);

            if (isExpanded) {
                return `
                    <div class="card card-full" data-session-id="${item.session_id}">
                        <div class="card-header">
                            <span class="card-title" onclick="toggleHistoryCard('${item.session_id}')">${item.date} at ${item.time}</span>
                            <button class="card-collapse" onclick="event.stopPropagation(); toggleHistoryCard('${item.session_id}')">−</button>
                        </div>
                        <div class="card-body">
                            <div class="card-preview" style="white-space: normal;">${escapeHtml(item.preview || 'No preview')}</div>
                            <div class="card-meta">${item.message_count || '?'} messages</div>
                        </div>
                        <div class="card-actions">
                            <button class="card-action primary" onclick="loadConversation('${item.session_id}')">Load</button>
                            <button class="card-action" onclick="archiveConversation('${item.session_id}')">Archive</button>
                            <button class="card-action danger" onclick="deleteConversation('${item.session_id}', event)">Delete</button>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="card card-minimal" data-session-id="${item.session_id}">
                        <span class="card-title" onclick="toggleHistoryCard('${item.session_id}')">${item.date} ${item.time}</span>
                        <span class="card-preview">${escapeHtml(item.preview || 'No preview')}</span>
                    </div>
                `;
            }
        }

        function toggleHistoryCard(sessionId) {
            const key = `history-${sessionId}`;
            if (expandedCards.has(key)) {
                expandedCards.delete(key);
            } else {
                expandedCards.add(key);
            }
            renderHistory();
        }

        async function loadConversation(oldSessionId) {
            try {
                const response = await fetch('/api/conversations/fork', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: oldSessionId })
                });
                if (!response.ok) throw new Error('Failed to fork');
                const data = await response.json();

                sessionId = data.new_session_id;
                localStorage.setItem('sessionId', sessionId);
                viewingHistorySessionId = oldSessionId;

                inlineMessages.innerHTML = '';
                for (const msg of data.messages) {
                    addInlineMessage(msg.content, msg.role === 'user' ? 'you' : 'friend');
                }

                // Switch to chat tab
                switchTab('chat');
                contextInput.focus();
            } catch (error) {
                console.error('Failed to load conversation:', error);
                alert('Failed to load conversation');
            }
        }

        // Legacy alias for forkConversation
        async function forkConversation(oldSessionId) {
            return loadConversation(oldSessionId);
        }

        async function archiveConversation(targetSessionId) {
            // For now, archive just deletes - could be enhanced to move to archive
            if (!confirm('Archive this conversation? (This will remove it from history)')) return;
            await deleteConversationById(targetSessionId);
        }

        async function deleteConversationById(targetSessionId) {
            try {
                const response = await fetch(`/api/conversations/${targetSessionId}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error('Failed to delete');

                // If we deleted the conversation we're currently viewing, clear the chat
                if (targetSessionId === viewingHistorySessionId) {
                    inlineMessages.innerHTML = '';
                    viewingHistorySessionId = null;
                }

                // Refresh history list
                await loadHistoryData();
            } catch (error) {
                console.error('Failed to delete conversation:', error);
                alert('Failed to delete conversation');
            }
        }

        async function deleteConversation(targetSessionId, event) {
            if (event) event.stopPropagation();
            if (!confirm('Delete this conversation permanently?')) return;
            await deleteConversationById(targetSessionId);
        }

        // ============== About ==============

        let aboutContent = null;

        async function loadAboutData() {
            try {
                const response = await fetch('/api/about');
                const data = await response.json();
                aboutContent = data.content || '';
                renderAbout();
            } catch (error) {
                console.error('Failed to load about:', error);
                document.getElementById('about-content').innerHTML =
                    '<div class="focus-empty">Failed to load about content</div>';
            }
        }

        function renderAbout() {
            const container = document.getElementById('about-content');
            if (!aboutContent) {
                container.innerHTML = '<div class="focus-empty">No content available</div>';
                return;
            }
            // Use marked to convert markdown to HTML
            container.innerHTML = marked.parse(aboutContent);
