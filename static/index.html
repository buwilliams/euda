<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>me·an·dus</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 640px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Header */
        header {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .logo {
            width: 240px;
            height: auto;
        }

        /* Activity Feed */
        .activity {
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 1rem;
            min-height: 2.5rem;
        }

        .activity-item {
            display: flex;
            align-items: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .activity-item:last-child {
            margin-bottom: 0;
        }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.75rem;
            flex-shrink: 0;
        }

        .activity-dot.working {
            background: #f59e0b;
            animation: pulse 1.5s infinite;
        }

        .activity-dot.done {
            background: #10b981;
        }

        .activity-dot.idle {
            background: #d1d5db;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .activity-quiet {
            color: #999;
            font-style: italic;
        }

        /* Notification items - clickable */
        .notification-item {
            display: flex;
            align-items: flex-start;
            padding: 0.5rem 0.75rem;
            margin: 0.25rem 0;
            background: #f8f9fa;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .notification-item:hover {
            background: #eef0f2;
        }

        .notification-icon {
            margin-right: 0.75rem;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .notification-content {
            flex: 1;
            min-width: 0;
        }

        .notification-title {
            font-weight: 500;
            color: #333;
            font-size: 0.9rem;
        }

        .notification-agent {
            color: #888;
            font-size: 0.8rem;
            margin-top: 0.15rem;
        }

        .notification-item.priority-high {
            background: #fef3c7;
            border-left: 3px solid #f59e0b;
        }

        .notification-item.priority-high:hover {
            background: #fde68a;
        }

        .notification-item.type-approval {
            background: #dbeafe;
            border-left: 3px solid #3b82f6;
        }

        .notification-item.type-approval:hover {
            background: #bfdbfe;
        }

        .notification-item.type-alert {
            background: #fee2e2;
            border-left: 3px solid #ef4444;
        }

        .notification-item.type-alert:hover {
            background: #fecaca;
        }

        /* Chat Section */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 1rem;
        }

        .message {
            margin-bottom: 1.25rem;
            line-height: 1.7;
        }

        .message-friend {
            padding-left: 1rem;
            border-left: 2px solid #e5e5e5;
        }

        .message-you {
            color: #333;
        }

        .message-content {
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message-thinking {
            color: #999;
            font-style: italic;
            display: flex;
            align-items: center;
            padding-left: 1rem;
            border-left: 2px solid #e5e5e5;
        }

        .thinking-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 0.5rem;
        }

        .thinking-dots span {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: thinking 1.4s infinite;
        }

        .thinking-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes thinking {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Chat Input */
        .chat-input-container {
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .chat-input {
            display: flex;
            gap: 0.75rem;
        }

        .chat-input input {
            flex: 1;
            padding: 0.875rem 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #666;
        }

        .chat-input input:disabled {
            background: #fafafa;
            color: #999;
        }

        .chat-input button {
            padding: 0.875rem 1.5rem;
            border: none;
            background: #000;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-input button:hover:not(:disabled) {
            background: #333;
        }

        .chat-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Quick actions - subtle hints, not buttons */
        .hints {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #999;
        }

        .hint {
            display: inline;
            cursor: pointer;
        }

        .hint:hover {
            color: #666;
        }

        /* Markdown Styles */
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4 {
            margin: 0.75em 0 0.5em 0;
            line-height: 1.3;
        }

        .message-content h1:first-child,
        .message-content h2:first-child,
        .message-content h3:first-child,
        .message-content h4:first-child {
            margin-top: 0;
        }

        .message-content h1 { font-size: 1.4em; }
        .message-content h2 { font-size: 1.2em; }
        .message-content h3 { font-size: 1.1em; }
        .message-content h4 { font-size: 1em; font-weight: 600; }

        .message-content p {
            margin: 0.5em 0;
        }

        .message-content p:first-child {
            margin-top: 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content strong {
            font-weight: 600;
        }

        .message-content em {
            font-style: italic;
        }

        .message-content ul,
        .message-content ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }

        .message-content li {
            margin: 0.25em 0;
        }

        .message-content code {
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 0.9em;
            background: #f5f5f5;
            padding: 0.15em 0.4em;
            border-radius: 3px;
        }

        .message-content pre {
            margin: 0.75em 0;
            padding: 0.75em 1em;
            background: #f5f5f5;
            border-radius: 4px;
            overflow-x: auto;
        }

        .message-content pre code {
            background: none;
            padding: 0;
            font-size: 0.85em;
            line-height: 1.5;
        }

        .message-content blockquote {
            margin: 0.75em 0;
            padding-left: 1em;
            border-left: 3px solid #ddd;
            color: #666;
        }

        .message-content a {
            color: #0066cc;
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        .message-content hr {
            margin: 1em 0;
            border: none;
            border-top: 1px solid #eee;
        }

        .message-content table {
            margin: 0.75em 0;
            border-collapse: collapse;
            width: 100%;
        }

        .message-content th,
        .message-content td {
            padding: 0.5em 0.75em;
            border: 1px solid #ddd;
            text-align: left;
        }

        .message-content th {
            background: #f9f9f9;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <img src="/static/images/meanddus-logo-with-subtitle.png" alt="me·an·dus" class="logo">
        </header>

        <section class="activity" id="activity">
            <div class="activity-quiet">All quiet. Your attention is free.</div>
        </section>

        <section class="chat">
            <div class="messages" id="messages">
                <div class="message message-friend">
                    <div class="message-content">Hey. I'm here when you need me. What's on your mind?</div>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Talk to me..." autofocus>
                    <button id="send-btn" onclick="sendMessage()">Send</button>
                </div>
                <div class="hints">
                    Try: <span class="hint" onclick="askAbout('what tasks do I have today')">"tasks today"</span> ·
                    <span class="hint" onclick="askAbout('show my projects')">"my projects"</span> ·
                    <span class="hint" onclick="askAbout('create a task to')">"create task"</span> ·
                    <span class="hint" onclick="askAbout('what has the agent completed for me')">"results"</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Configure marked for security
        marked.setOptions({
            breaks: true,      // Convert \n to <br>
            gfm: true,         // GitHub Flavored Markdown
            headerIds: false,  // Don't add IDs to headers
            mangle: false      // Don't mangle email addresses
        });

        // State
        let sessionId = localStorage.getItem('sessionId') || null;
        let isWaiting = false;

        // Elements
        const messagesEl = document.getElementById('messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const activityEl = document.getElementById('activity');

        // Send message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || isWaiting) return;

            addMessage(message, 'you');
            chatInput.value = '';
            setWaiting(true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                const data = await response.json();
                sessionId = data.session_id;
                localStorage.setItem('sessionId', sessionId);

                removeThinking();
                addMessage(data.response, 'friend');
            } catch (error) {
                removeThinking();
                addMessage('I had trouble processing that. Could you try again?', 'friend');
            }

            setWaiting(false);
        }

        function setWaiting(waiting) {
            isWaiting = waiting;
            chatInput.disabled = waiting;
            sendBtn.disabled = waiting;

            if (waiting) {
                addThinking();
            }
        }

        function addMessage(content, role) {
            const div = document.createElement('div');
            div.className = `message message-${role}`;

            // Render markdown for assistant messages, escape HTML for user messages
            let html;
            if (role === 'friend') {
                html = marked.parse(content);
            } else {
                html = escapeHtml(content);
            }

            div.innerHTML = `<div class="message-content">${html}</div>`;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function addThinking() {
            const div = document.createElement('div');
            div.className = 'message-thinking';
            div.id = 'thinking';
            div.innerHTML = `Thinking<div class="thinking-dots"><span></span><span></span><span></span></div>`;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function removeThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function askAbout(query) {
            chatInput.value = query;
            chatInput.focus();
        }

        // Enter to send
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isWaiting) sendMessage();
        });

        // Activity polling
        let lastAgentStates = {};
        let notifications = [];

        async function pollActivity() {
            try {
                // Fetch both agent status and notifications in parallel
                const [agentResponse, notifResponse] = await Promise.all([
                    fetch('/api/agents/status'),
                    fetch('/api/notifications')
                ]);

                const agentData = await agentResponse.json();
                const notifData = await notifResponse.json();

                const activities = [];

                for (const agent of agentData.agents) {
                    const key = agent.name;
                    const prevState = lastAgentStates[key];

                    // Check if agent just completed work
                    if (agent.last_active && prevState?.last_active !== agent.last_active) {
                        if (prevState) {
                            activities.push({
                                text: `${agent.name.split(' ')[0]} finished`,
                                status: 'done'
                            });
                        }
                    }

                    // Check if agent is working (status is 'ready' with recent activity)
                    if (agent.status === 'ready') {
                        const lastActive = new Date(agent.last_active);
                        const now = new Date();
                        const secondsAgo = (now - lastActive) / 1000;

                        if (secondsAgo < 30) {
                            activities.push({
                                text: `${agent.name.split(' ')[0]} working...`,
                                status: 'working'
                            });
                        }
                    }

                    lastAgentStates[key] = { ...agent };
                }

                // Store notifications for click handling
                notifications = notifData.notifications || [];

                updateActivityFeed(activities, notifications);
            } catch (error) {
                // Silent fail - activity feed is non-critical
            }
        }

        function getNotificationIcon(type) {
            switch (type) {
                case 'approval': return '👋';
                case 'question': return '❓';
                case 'alert': return '⚠️';
                default: return '💬';
            }
        }

        function handleNotificationClick(notification) {
            // Mark as seen
            fetch(`/api/notifications/${notification.id}/seen`, { method: 'POST' });

            // If there's an action prompt, inject it into chat
            if (notification.action_prompt) {
                chatInput.value = notification.action_prompt;
                chatInput.focus();
            } else {
                // Default: inject the title as a conversation starter
                chatInput.value = `Tell me about: ${notification.title}`;
                chatInput.focus();
            }
        }

        function updateActivityFeed(activities, notifs) {
            let html = '';

            // Show notifications first (they're more important)
            if (notifs && notifs.length > 0) {
                notifs.forEach((n, idx) => {
                    const typeClass = n.type ? `type-${n.type}` : '';
                    const priorityClass = n.priority === 'high' ? 'priority-high' : '';
                    const icon = getNotificationIcon(n.type);

                    html += `<div class="notification-item ${typeClass} ${priorityClass}"
                                 onclick="handleNotificationClick(notifications[${idx}])">
                        <span class="notification-icon">${icon}</span>
                        <div class="notification-content">
                            <div class="notification-title">${escapeHtml(n.title)}</div>
                            <div class="notification-agent">from ${escapeHtml(n.agent_name)}</div>
                        </div>
                    </div>`;
                });
            }

            // Then show agent activities
            if (activities.length > 0) {
                activities.forEach(a => {
                    html += `<div class="activity-item">
                        <span class="activity-dot ${a.status}"></span>
                        ${escapeHtml(a.text)}
                    </div>`;
                });
            }

            // If nothing to show
            if (html === '') {
                html = '<div class="activity-quiet">All quiet. Your attention is free.</div>';
            }

            activityEl.innerHTML = html;
        }

        // Poll every 3 seconds
        setInterval(pollActivity, 3000);
        pollActivity();

        // Focus input on load
        chatInput.focus();
    </script>
</body>
</html>
